<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube AI | Command Center</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { text-align: center; max-width: 600px; width: 100%; background: #1e293b; padding: 40px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; font-size: 1rem; }
        .btn { background: #38bdf8; color: #0f172a; padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; width: 80%; }
        .btn:hover { background: #7dd3fc; transform: translateY(-2px); }
        #result { margin-top: 30px; padding: 20px; border-top: 1px solid #334155; color: #38bdf8; font-weight: bold; font-size: 1.2rem; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AutoTube AI</h1>
        <p>YouTube Idea Generator v1.0</p>
        
        <input type="text" id="topicInput" placeholder="Enter a topic (e.g. AI News)">
        <button class="btn" onclick="generateIdea()">Generate Viral Title</button>
        
        <div id="result">Waiting for input...</div>
    </div>

    <script>
        function generateIdea() {
            const topic = document.getElementById('topicInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!topic) {
                resultDiv.innerText = "Please enter a topic first!";
                return;
            }

            const templates = [
                `The INSANE Future of ${topic} (2026)`,
                `Why ${topic} is Changing Everything Right Now`,
                `I tried ${topic} for 30 Days: Here's What Happened`,
                `5 ${topic} Secrets Nobody Told You About`,
                `Stop doing ${topic} the wrong way!`
            ];
            
            const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
            resultDiv.innerText = "Generating...";
            
            setTimeout(() => {
                resultDiv.innerText = randomTemplate;
            }, 800);
        }
    </script>
</body>
</html>
