    <script>
        function generateLocalIdea() {
            const niche = document.getElementById('nicheInput').value || "YouTube";
            const templates = [
                `10 Secrets About ${niche} They Don't Want You To Know`,

                `The Rise and Fall of ${niche}`
            ];
            
            const randomIdea = templates[Math.floor(Math.random() * templates.length)];
            
            document.getElementById('ideaText').innerText = randomIdea;
            document.getElementById('resultArea').classList.remove('hidden');
        }
