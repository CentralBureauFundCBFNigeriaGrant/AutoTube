<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube Command Center | v1.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .niche-tag { cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 8px; font-size: 12px; background: #0f172a; }
        .active-niche { border: 2px solid #6366f1; background: #1e293b !important; color: #818cf8; font-weight: bold; }
        .idea-card { cursor: pointer; border: 1px solid #334155; transition: 0.2s; background: #1e293b; padding: 15px; border-radius: 12px; }
        .idea-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .timeline-box { min-width: 200px; background: #334155; border-radius: 10px; padding: 15px; border-bottom: 4px solid #6366f1; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-6xl mx-auto bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
        <div class="p-6 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold gradient-text">AutoTube Engine</h1>
                <p id="activeNicheDisplay" class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">READY</p>
            </div>
            <div class="bg-emerald-500/10 text-emerald-400 text-[10px] px-3 py-1 rounded-full border border-emerald-500/20">SYSTEM ONLINE</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4">
            <div class="p-6 border-r border-slate-700 bg-slate-900/20 md:col-span-1">
                <h2 class="text-xs font-semibold text-slate-400 mb-4 uppercase">Channel Niches</h2>
                <div id="nicheList"></div>
                <div class="flex gap-2 mt-4">
                    <input id="nicheInput" type="text" placeholder="Add..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs">
                    <button onclick="addNiche()" class="bg-indigo-600 px-3 rounded">+</button>
                </div>
            </div>

            <div class="md:col-span-3 p-6">
                <button id="generateBtn" onclick="runAutoTube()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold text-lg mb-6 transition-all active:scale-95 shadow-lg">
                    GENERATE IDEAS
                </button>

                <div id="ideasGrid" class="grid grid-cols-1 gap-4 mb-8"></div>

                <div id="productionRoom" class="hidden border-t border-slate-700 pt-6">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-indigo-400 font-bold text-sm uppercase tracking-widest">Master Timeline</h2>
                        <button onclick="generateScript()" id="scriptBtn" class="bg-emerald-600 hover:bg-emerald-500 text-[10px] px-4 py-2 rounded-lg font-bold">GENERATE SCRIPT & SCENES</button>
                    </div>

                    <div class="flex overflow-x-auto gap-4 pb-6 mb-6" id="timelineList">
                        <div class="text-slate-500 text-xs italic p-10 border-2 border-dashed border-slate-700 w-full text-center rounded-xl">
                            Click 'Generate Script' to populate the timeline...
                        </div>
                    </div>

                    <div class="bg-slate-900 rounded-2xl p-6 border border-slate-700">
                        <h3 id="selectedTitle" class="text-white font-bold mb-4"></h3>
                        <div id="scriptOutput" class="text-slate-400 text-sm font-mono whitespace-pre-wrap leading-relaxed h-48 overflow-y-auto bg-black/30 p-4 rounded-lg">
                            Waiting for script command...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["AI News", "Pregnancy Tips"];
        let currentNiche = niches[0] || "";
        let activeIdea = "";

        const API_KEY = "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"; 

        function init() { renderNiches(); selectNiche(currentNiche); }

        function addNiche() {
            const val = document.getElementById('nicheInput').value.trim();
            if(val) { niches.push(val); localStorage.setItem('myNiches', JSON.stringify(niches)); renderNiches(); }
        }

        function renderNiches() {
            document.getElementById('nicheList').innerHTML = niches.map(n => `
                <div onclick="selectNiche('${n}')" class="niche-tag ${n === currentNiche ? 'active-niche' : ''}">${n}</div>
            `).join('');
        }

        function selectNiche(n) {
            currentNiche = n;
            document.getElementById('activeNicheDisplay').innerText = "MODE: " + n.toUpperCase();
            renderNiches();
        }

        async function runAutoTube() {
            const grid = document.getElementById('ideasGrid');
            const btn = document.getElementById('generateBtn');
            btn.disabled = true; grid.innerHTML = "<p class='text-center text-slate-500 animate-pulse'>Consulting Llama 3...</p>";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: `List 5 viral YouTube Short titles for: "${currentNiche}". Format ONLY as a JSON list: ["Title 1", "Title 2"...]` }],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                const titles = JSON.parse(data.choices[0].message.content);
                grid.innerHTML = titles.map(t => `<div onclick="prepProduction('${t}')" class="idea-card">${t} <span class="text-indigo-400 block text-[10px] mt-2">TAP TO PRODUCE →</span></div>`).join('');
            } catch (e) { alert("Error: " + e.message); grid.innerHTML = ""; }
            finally { btn.disabled = false; }
        }

        function prepProduction(title) {
            activeIdea = title;
            document.getElementById('productionRoom').classList.remove('hidden');
            document.getElementById('selectedTitle').innerText = title;
            document.getElementById('timelineList').innerHTML = `<div class='p-10 w-full text-center text-slate-500'>Ready to build timeline for: ${title}</div>`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function generateScript() {
            const output = document.getElementById('scriptOutput');
            const sBtn = document.getElementById('scriptBtn');
            sBtn.innerText = "WRITING..."; sBtn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: `Write a 4-part short script for: "${activeIdea}". Break it into: [HOOK], [STORY], [VALUE], [CTA].` }],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                const script = data.choices[0].message.content;
                output.innerText = script;
                buildTimeline(script);
            } catch (e) { alert(e.message); }
            finally { sBtn.innerText = "REGENERATE SCRIPT"; sBtn.disabled = false; }
        }

        function buildTimeline(script) {
            const timeline = document.getElementById('timelineList');
            // Basic parser to split by brackets [ ]
            const scenes = script.split(/\[|\]/g).filter(s => s.trim().length > 10);
            
            timeline.innerHTML = scenes.map((text, i) => `
                <div class="timeline-box">
                    <div class="text-[10px] text-indigo-400 font-bold mb-2">SCENE ${i+1}</div>
                    <p class="text-[11px] text-slate-200 line-clamp-3 mb-4 italic">"${text.substring(0, 60)}..."</p>
                    <div class="space-y-2">
                        <div class="bg-slate-900 p-2 rounded border border-slate-700 text-[9px] flex justify-between">
                            <span>🎙️ Voice</span> <span class="text-slate-500">Pending</span>
                        </div>
                        <div class="bg-slate-900 p-2 rounded border border-slate-700 text-[9px] flex justify-between">
                            <span>🎬 Visual</span> <span class="text-slate-500">Pending</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
