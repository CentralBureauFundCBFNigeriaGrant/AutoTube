    <script>
        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["AI News", "Pregnancy Tips", "Luxury Vlogs"];

        const API_KEY = "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"; // <--- REMEMBER TO PUT YOUR KEY HERE!

        function init() {
            renderNiches();
            updateActiveNiche(currentNiche);
        }

        function addNiche() {
            const input = document.getElementById('nicheInput');
            const val = input.value.trim();
            if(val) {
                niches.push(val);
                localStorage.setItem('myNiches', JSON.stringify(niches));
                input.value = "";
                renderNiches();
            }
        }

        function renderNiches() {
            const list = document.getElementById('nicheList');
            if (list) {
                list.innerHTML = niches.map(n => `
                    <div onclick="updateActiveNiche('${n}')" class="niche-tag p-3 bg-slate-800 rounded-lg text-sm border border-slate-700 ${n === currentNiche ? 'active-niche' : ''}">
                        ${n}
                    </div>
                `).join('');
            }
        }

        function updateActiveNiche(n) {
            currentNiche = n;
            const display = document.getElementById('activeNicheDisplay');
            if (display) {
                display.innerText = "MODE: " + n.toUpperCase();
            }
            renderNiches();
        }

        async function runAutoTube() {
            const ideaText = document.getElementById('ideaText');
            const resultArea = document.getElementById('resultArea');
            const status = document.getElementById('status');
            const btn = document.getElementById('generateBtn');

            if (!currentNiche) {
                alert("Select or add a niche first!");
                return;
            }

            status.innerText = `Llama is thinking about ${currentNiche}...`;
            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            resultArea.classList.add('hidden');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{
                            role: "user",
                            content: `Act as a YouTube Automation Expert. My channel niche is "${currentNiche}". 
                            Generate 5 high-CTR viral video titles and a specific 'Hook' for each. 
                            Format it clearly for a dashboard.`
                        }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                ideaText.innerText = data.choices[0].message.content;
                resultArea.classList.remove('hidden');
                status.innerText = "Content Generated Successfully!";

            } catch (error) {
                status.innerText = "Connection failed.";
                console.error("Error:", error);
                alert("Groq Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "GENERATE NICHE CONTENT";
            }
        }

        init();
    </script>
