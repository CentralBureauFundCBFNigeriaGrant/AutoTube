<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube | Motion Studio v2.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; transition: 0.3s; }
        .sidebar-item { border-radius: 8px; transition: 0.2s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 12px; font-size: 13px; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #272727; }
        .active-niche { background-color: #272727; border-left: 4px solid #f00; color: #f00; font-weight: bold; }
        .timeline-box { min-width: 320px; background-color: #121212; border: 1px solid #282828; border-radius: 16px; padding: 15px; position: relative; }
        .visual-container { width: 100%; height: 180px; background: #000; border-radius: 10px; margin-bottom: 12px; overflow: hidden; border: 1px solid #222; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } }
        ::-webkit-scrollbar { height: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card p-4 flex items-center gap-3">
                <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                    <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">AutoTube</h1>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest text-center">Voice Lab</h2>
                <div class="bg-black p-3 rounded-lg border border-[#282828] mb-4">
                    <p class="text-[9px] text-gray-400 uppercase font-bold mb-2">Selected Voice</p>
                    <select id="voiceSelect" class="w-full bg-black text-[11px] text-red-500 border-none outline-none"></select>
                </div>
                <button id="recBtn" onclick="handleMic()" class="w-full border border-[#333] py-3 rounded-xl text-[11px] font-bold hover:bg-[#272727] flex items-center justify-center gap-2">
                    <div id="micDot" class="w-2 h-2 bg-gray-600 rounded-full"></div> 
                    <span id="recText">VOICE DNA</span>
                </button>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Channel Niches</h2>
                <div id="nicheList" class="max-h-40 overflow-y-auto mb-4"></div>
                <div class="flex gap-2">
                    <input id="nIn" type="text" placeholder="Add niche..." class="w-full bg-black border border-[#282828] rounded-lg p-2 text-xs outline-none">
                    <button onclick="addN()" class="bg-[#272727] px-4 rounded-lg text-white font-bold">+</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-red-600">
                <div>
                    <h2 class="text-2xl font-black">Content Engine</h2>
                    <p class="text-[10px] text-gray-500 uppercase">Active: <span id="activeNText" class="text-red-600 font-bold"></span></p>
                </div>
                <div class="flex gap-2">
                   <button onclick="genIdeas()" class="yt-red px-8 py-4 rounded-full font-black text-sm hover:scale-105 transition-all">GENERATE IDEAS</button>
                </div>
            </div>

            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div id="studioRoom" class="hidden card p-6 border-t-2 border-red-600">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 class="text-[10px] font-black tracking-widest uppercase">Video Production</h2>
                    <div class="flex gap-3">
                        <button onclick="genScript()" id="sBtn" class="bg-[#272727] px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider">1. Write Script</button>
                        <button onclick="playAll()" id="playAllBtn" class="bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider">2. Preview Video</button>
                    </div>
                </div>

                <div class="flex overflow-x-auto gap-6 pb-6 mb-6" id="timeline"></div>

                <div class="bg-black p-4 rounded-xl border border-[#282828] relative">
                    <div id="scriptOut" class="text-xs text-gray-500 font-mono h-24 overflow-y-auto italic">Script will appear here...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API KEYS
        const GROQ_KEY = "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";
        const PEXELS_KEY = "KWuG4HcuoYcEI9EfShHFrlIGqqeAuSFrKGUleCanREA4RJWdfKJpMe0W";

        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["Bible Stories", "Tech Tips"];
        let curN = niches[0];
        let scenes = [];
        const synth = window.speechSynthesis;

        function init() { renderN(); selN(curN); setTimeout(loadVoices, 500); }

        function loadVoices() {
            const select = document.getElementById('voiceSelect');
            const voices = synth.getVoices();
            select.innerHTML = voices
                .sort((a, b) => a.lang.localeCompare(b.lang))
                .map(v => `<option value="${v.name}">${v.name.includes('Google') ? '⭐ ' : ''}[${v.lang}] ${v.name}</option>`).join('');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }

        // --- THE MOTION ENGINE ---
        async function genVisual(index, promptText) {
            const container = document.getElementById(`box-${index}`);
            const btn = document.getElementById(`vbtn-${index}`);
            btn.innerText = "FETCHING MOTION...";
            container.classList.add('animate-pulse');

            try {
                // Step 1: Search Pexels for REAL Video
                const pexelsRes = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(promptText)}&per_page=1`, {
                    headers: { Authorization: PEXELS_KEY }
                });
                const pData = await pexelsRes.json();

                if (pData.videos && pData.videos.length > 0) {
                    const videoUrl = pData.videos[0].video_files.find(f => f.width >= 1280)?.link || pData.videos[0].video_files[0].link;
                    container.innerHTML = `<video id="media-${index}" src="${videoUrl}" autoplay loop muted class="w-full h-full object-cover"></video>`;
                    btn.innerText = "CINEMATIC VIDEO";
                    btn.classList.replace('bg-emerald-600/20', 'bg-blue-600/20');
                } else {
                    throw new Error("No video found");
                }
            } catch (e) {
                // Step 2: Fallback to Pollinations AI Image
                btn.innerText = "AI IMAGE FALLBACK";
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent('Cinematic 8k: ' + promptText)}?width=1280&height=720&nologo=true&seed=${Math.random()}`;
                container.innerHTML = `<img id="media-${index}" src="${imgUrl}" class="w-full h-full object-cover">`;
            }
            container.classList.remove('animate-pulse');
        }

        async function playAll() {
            const btn = document.getElementById('playAllBtn');
            btn.innerText = "PLAYING PRODUCTION...";
            for(let i=0; i<scenes.length; i++) {
                const media = document.getElementById(`media-${i}`);
                if(media && media.tagName === "VIDEO") media.currentTime = 0;
                
                speakLine(i);
                await new Promise(r => {
                    const checker = setInterval(() => {
                        if(!synth.speaking) { clearInterval(checker); r(); }
                    }, 500);
                });
            }
            btn.innerText = "2. PREVIEW VIDEO";
        }

        function speakLine(index) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(scenes[index]);
            const voices = synth.getVoices();
            msg.voice = voices.find(v => v.name === document.getElementById('voiceSelect').value);
            msg.rate = 0.95; // Slightly slower for "Premium" feel
            synth.speak(msg);
        }

        // --- APP LOGIC ---
        function addN() { const v = document.getElementById('nIn').value; if(v){ niches.push(v); saveN(); renderN(); document.getElementById('nIn').value=""; } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); saveN(); renderN(); }
        function saveN() { localStorage.setItem('myNiches', JSON.stringify(niches)); }
        function renderN() {
            document.getElementById('nicheList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}">
                    <span class="truncate">${n}</span>
                    <span onclick="delN(${i},event)" class="text-gray-600 hover:text-red-500">🗑️</span>
                </div>`).join('');
        }
        function selN(n) { curN = n; document.getElementById('activeNText').innerText = n.toUpperCase(); renderN(); }

        async function genIdeas() {
            const g = document.getElementById('ideasGrid');
            g.innerHTML = "<p class='col-span-2 text-center text-xs italic animate-pulse py-10'>AI is brainstorming viral hits...</p>";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${GRO_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Give me 5 viral short titles for ${curN}. Return JSON array only: ["Title 1", "Title 2"]`}]
                    })
                });
                const d = await r.json();
                const t = JSON.parse(d.choices[0].message.content.match(/\[.*\]/s)[0]);
                g.innerHTML = t.map(x => `
                    <div onclick="openStudio('${x.replace(/'/g, "\\'")}')" class="card p-6 hover:border-red-600 cursor-pointer border-l-4 border-transparent">
                        <h3 class="font-bold text-sm mb-2">${x}</h3>
                        <p class="text-[9px] text-red-600 font-black uppercase">Start Production</p>
                    </div>`).join('');
            } catch(e) { g.innerHTML = "<p class='text-red-500 text-center py-10'>Key or Connection Error.</p>"; }
        }

        function openStudio(t) { 
            document.getElementById('studioRoom').classList.remove('hidden'); 
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); 
        }

        async function genScript() {
            const btn = document.getElementById('sBtn'); btn.innerText = "WRITING...";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${GRO_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Write 4 cinematic scenes for a video about ${curN}. For each scene, include a 3-word visual keyword. Format: [S1] (Keywords) Text...`}]
                    })
                });
                const d = await r.json();
                const s = d.choices[0].message.content;
                document.getElementById('scriptOut').innerText = s;
                
                // Extracting scenes and keywords
                scenes = s.split(/\[S\d\]/i).filter(x => x.trim().length > 5);
                
                document.getElementById('timeline').innerHTML = scenes.map((x, i) => {
                    const kwMatch = x.match(/\(([^)]+)\)/);
                    const keywords = kwMatch ? kwMatch[1] : curN;
                    const cleanText = x.replace(/\([^)]+\)/, "").trim();
                    scenes[i] = cleanText; // Update global scenes array with clean text

                    return `
                    <div class="timeline-box">
                        <div class="visual-container" id="box-${i}">
                            <div class="flex items-center justify-center h-full text-gray-700 text-[10px] font-bold">NO MOTION LOADED</div>
                        </div>
                        <p class="text-[9px] text-gray-500 font-black mb-1 uppercase">Scene ${i+1}</p>
                        <p class="text-[11px] text-white line-clamp-2 h-8 italic mb-4">"${cleanText}"</p>
                        <button id="vbtn-${i}" onclick="genVisual(${i}, '${keywords}')" class="w-full bg-emerald-600/20 text-emerald-500 border border-emerald-600/30 py-2 rounded-lg text-[9px] font-black uppercase tracking-tighter">Generate Motion</button>
                    </div>`;
                }).join('');
            } catch(e) { alert("Script Error"); }
            btn.innerText = "1. WRITE SCRIPT";
        }

        init();
    </script>
</body>
    </html>
