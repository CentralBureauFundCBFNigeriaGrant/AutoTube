<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube | Resilient v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #050505; border-radius: 16px; overflow: hidden; border: 1px solid #333; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .control-btn { transition: 0.2s; border: 1px solid #333; font-weight: 900; text-transform: uppercase; font-size: 10px; border-radius: 8px; padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .control-btn:hover { background: #222; border-color: #f00; }
        input[type=range] { accent-color: #f00; cursor: pointer; }
        .sidebar-item { border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; padding: 10px; font-size: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .active-niche { background-color: #272727; border-color: #f00; color: #f00; font-weight: bold; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-6" onload="init()">

    <div class="max-w-7xl mx-auto mb-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-8 yt-red rounded flex items-center justify-center shadow-xl shadow-red-900/30">
                <div class="w-0 h-0 border-t-[6px] border-t-transparent border-l-[10px] border-l-white border-b-[6px] border-b-transparent ml-1"></div>
            </div>
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">AutoTube <span class="text-[10px] font-bold not-italic text-gray-600 bg-white/5 px-2 py-1 rounded ml-2">PRO 4.5</span></h1>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="card p-6 border-t-4 border-red-600">
                <h2 class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-[0.2em]">1. Niche Selector</h2>
                <p class="text-[9px] text-gray-600 uppercase mb-3 font-bold">Active: <span id="activeNText" class="text-red-600">NONE</span></p>
                <div id="nicheList" class="max-h-48 overflow-y-auto mb-4 space-y-1"></div>
                <div class="flex gap-2 mb-6">
                    <input id="nIn" type="text" placeholder="Add custom niche..." class="flex-1 bg-black border border-[#333] rounded-lg p-3 text-xs outline-none focus:border-red-600">
                    <button onclick="addN()" class="bg-[#272727] px-5 rounded-lg text-white font-bold hover:bg-red-600">+</button>
                </div>
                <button onclick="genIdeas()" class="w-full yt-red py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:scale-[1.02] transition-all">Brainstorm Viral Topics</button>
                <div id="ideasGrid" class="mt-4 space-y-2"></div>
            </div>

            <div class="card p-6">
                <h2 class="text-[10px] font-black text-gray-600 uppercase mb-4 tracking-widest">API Keys</h2>
                <div class="space-y-3">
                    <input id="groqKeyIn" type="password" class="w-full bg-black border border-[#222] text-[10px] p-3 rounded-lg outline-none focus:border-red-600" onchange="saveKeys()" placeholder="Groq API Key">
                    <input id="pexelsKeyIn" type="password" class="w-full bg-black border border-[#222] text-[10px] p-3 rounded-lg outline-none focus:border-red-600" onchange="saveKeys()" placeholder="Pexels API Key">
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="card p-8 border-b-4 border-red-600 relative overflow-hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 relative z-10">
                    <div>
                        <h2 class="text-xl font-black italic tracking-tighter uppercase">Studio Terminal</h2>
                        <p class="text-[10px] text-gray-500 uppercase mt-1">Status: <span id="autoStatus" class="text-red-500">Ready</span></p>
                    </div>
                    <button onclick="genFullProduction()" id="prodBtn" class="bg-emerald-600 px-10 py-4 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-emerald-500 shadow-xl transition-all">Launch Production</button>
                </div>

                <div id="studioArea" class="space-y-6 opacity-40 grayscale pointer-events-none transition-all duration-700">
                    <div class="player-stage group">
                        <div id="mainMediaBox" class="w-full h-full flex items-center justify-center text-gray-800 font-black text-[10px] uppercase bg-black text-center px-10">Select a topic above</div>
                        
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="prevScene()" class="bg-black/80 p-4 rounded-full border border-white/10 hover:bg-red-600">←</button>
                        </div>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="nextScene()" class="bg-black/80 p-4 rounded-full border border-white/10 hover:bg-red-600">→</button>
                        </div>

                        <div class="absolute bottom-4 left-4 right-4 flex justify-between items-center">
                            <span id="sceneIndicator" class="bg-black/90 px-4 py-1.5 rounded-full text-[9px] font-bold text-red-600 border border-white/10">Scene 0/0</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                        <div class="md:col-span-8 bg-black p-6 rounded-2xl border border-[#222]">
                            <p class="text-[9px] text-gray-500 font-black mb-3 uppercase">Narration</p>
                            <div id="currentSceneText" class="text-base italic text-gray-300 min-h-[60px]">---</div>
                            <div id="currentVisualPrompt" class="mt-4 text-[9px] text-emerald-700 font-mono truncate uppercase">---</div>
                        </div>

                        <div class="md:col-span-4 flex flex-col gap-4">
                            <div class="bg-black p-5 rounded-2xl border border-[#222] space-y-4">
                                <select id="voiceSelect" class="w-full bg-transparent text-[11px] text-red-500 border-none outline-none font-bold"></select>
                                <div class="space-y-3">
                                    <div class="flex justify-between text-[8px] text-gray-500 uppercase"><span>Speed</span><span id="vRateVal">0.9x</span></div>
                                    <input type="range" id="vRate" min="0.5" max="1.5" step="0.1" value="0.9" class="w-full" oninput="document.getElementById('vRateVal').innerText=this.value+'x'">
                                    <div class="flex justify-between text-[8px] text-gray-500 uppercase"><span>Pitch</span><span id="vPitchVal">1.0</span></div>
                                    <input type="range" id="vPitch" min="0.5" max="1.5" step="0.1" value="1.0" class="w-full" oninput="document.getElementById('vPitchVal').innerText=this.value">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="speakActive()" class="control-btn bg-white text-black">▶ PLAY</button>
                                <button onclick="pauseSpeech()" class="control-btn text-white">⏸ PAUSE</button>
                                <button onclick="playFullSequence()" id="playAllBtn" class="col-span-2 control-btn bg-red-600/10 text-red-600">Play Full Sequence</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["Bible Stories", "Success"];
        let curN = niches[0];
        let scenes = []; 
        let currentIdx = 0;
        const synth = window.speechSynthesis;

        function init() {
            document.getElementById('groqKeyIn').value = localStorage.getItem('groq_key') || "";
            document.getElementById('pexelsKeyIn').value = localStorage.getItem('pexels_key') || "";
            renderN(); selN(curN); setTimeout(loadVoices, 500);
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groqKeyIn').value);
            localStorage.setItem('pexels_key', document.getElementById('pexelsKeyIn').value);
        }

        function loadVoices() {
            const vS = document.getElementById('voiceSelect');
            const voices = synth.getVoices();
            if(!voices.length) { setTimeout(loadVoices, 300); return; }
            vS.innerHTML = voices.map(v => `<option value="${v.name}">[${v.lang}] ${v.name}</option>`).join('');
        }

        function selN(n) { 
            synth.cancel(); curN = n; scenes = []; currentIdx = 0;
            document.getElementById('activeNText').innerText = n.toUpperCase();
            document.getElementById('ideasGrid').innerHTML = "";
            document.getElementById('studioArea').classList.add('opacity-40', 'grayscale', 'pointer-events-none');
            renderN(); 
        }

        async function genIdeas() {
            const g = document.getElementById('ideasGrid');
            const key = document.getElementById('groqKeyIn').value;
            if(!key) return alert("Add Groq Key!");
            g.innerHTML = "<div class='text-center py-4 animate-pulse text-red-600'>Thinking...</div>";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `5 viral YouTube titles for: ${curN}. Output ONLY a JSON array of strings.`}]
                    })
                });
                const d = await r.json();
                const titles = JSON.parse(d.choices[0].message.content.match(/\[.*\]/s)[0]);
                g.innerHTML = titles.map(t => `<div onclick="prepStudio('${t.replace(/'/g, "\\'")}')" class="bg-black/50 border border-[#222] p-3 rounded-lg text-xs cursor-pointer hover:border-red-600 uppercase font-bold text-gray-400 hover:text-white">${t}</div>`).join('');
            } catch(e) { g.innerHTML = "Error. Check key."; }
        }

        function prepStudio(title) {
            document.getElementById('studioArea').classList.remove('opacity-40', 'grayscale', 'pointer-events-none');
            document.getElementById('autoStatus').innerText = title.toUpperCase();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function genFullProduction() {
            const btn = document.getElementById('prodBtn');
            const status = document.getElementById('autoStatus');
            const gKey = document.getElementById('groqKeyIn').value;
            const pKey = document.getElementById('pexelsKeyIn').value;

            btn.innerText = "🎬 FILMING...";
            btn.classList.add('loading-pulse');

            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${gKey}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Create a 6-scene script for "${status.innerText}". Scene 3: Subscribe nudge. Scene 6: End with Like/Subscribe. JSON only: [{"v_prompt": "10 words", "narration": "script"}]`}]
                    })
                });
                const d = await r.json();
                
                // HARDENED JSON PARSING
                const rawJson = d.choices[0].message.content.match(/\[\s*\{.*\}\s*\]/s);
                if(!rawJson) throw new Error("AI returned invalid format");
                scenes = JSON.parse(rawJson[0]);
                
                currentIdx = 0;
                updatePlayer();

                for(let i=0; i<scenes.length; i++) {
                    try {
                        const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(scenes[i].v_prompt)}&per_page=1`, {
                            headers: { Authorization: pKey }
                        });
                        const pData = await res.json();
                        if (pData.videos?.length > 0) {
                            scenes[i].mType = 'video';
                            scenes[i].mUrl = pData.videos[0].video_files.find(f => f.width >= 1280)?.link || pData.videos[0].video_files[0].link;
                        } else { throw new Error(); }
                    } catch (e) {
                        scenes[i].mType = 'image';
                        scenes[i].mUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent('cinematic 8k ' + scenes[i].v_prompt)}?width=1280&height=720&nologo=true`;
                    }
                    if(currentIdx === i) updatePlayer();
                }
                btn.innerText = "DONE";
                btn.classList.remove('loading-pulse');
            } catch(e) { 
                console.error(e);
                alert("PRODUCTION ERROR: " + (gKey ? "AI format error. Try again." : "Missing Groq Key.")); 
                btn.innerText = "RETRY";
            }
        }

        function updatePlayer() {
            if(!scenes[currentIdx]) return;
            const s = scenes[currentIdx];
            const box = document.getElementById('mainMediaBox');
            document.getElementById('sceneIndicator').innerText = `Scene ${currentIdx + 1} / ${scenes.length}`;
            document.getElementById('currentSceneText').innerText = s.narration;
            document.getElementById('currentVisualPrompt').innerText = "Visual: " + s.v_prompt;
            box.innerHTML = '';
            if (!s.mUrl) {
                box.innerHTML = `<div class="animate-pulse">Loading Scene ${currentIdx+1}...</div>`;
            } else if (s.mType === 'video') {
                box.innerHTML = `<video src="${s.mUrl}" autoplay loop muted playsinline></video>`;
            } else {
                box.innerHTML = `<img src="${s.mUrl}">`;
            }
        }

        function speakActive() {
            if(!scenes[currentIdx]) return;
            if(synth.paused) { synth.resume(); return; }
            synth.cancel();
            const m = new SpeechSynthesisUtterance(scenes[currentIdx].narration);
            m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            m.rate = document.getElementById('vRate').value;
            m.pitch = document.getElementById('vPitch').value;
            synth.speak(m);
        }

        function pauseSpeech() { if(synth.speaking) synth.pause(); }

        async function playFullSequence() {
            for(let i=0; i < scenes.length; i++) {
                currentIdx = i;
                updatePlayer();
                speakActive();
                await new Promise(r => {
                    const check = setInterval(() => { if(!synth.speaking){ clearInterval(check); r(); } }, 500);
                });
            }
        }

        function nextScene() { if(currentIdx < scenes.length - 1) { currentIdx++; updatePlayer(); } }
        function prevScene() { if(currentIdx > 0) { currentIdx--; updatePlayer(); } }
        function addN() { const v = document.getElementById('nIn').value; if(v){ niches.push(v); localStorage.setItem('myNiches', JSON.stringify(niches)); renderN(); document.getElementById('nIn').value=""; } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); localStorage.setItem('myNiches', JSON.stringify(niches)); renderN(); }
        function renderN() {
            document.getElementById('nicheList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}"><span>${n}</span><span onclick="delN(${i},event)">🗑️</span></div>`).join('');
        }
    </script>
</body>
</html>
