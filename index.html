<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoTube | v7.0 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Oswald:wght@700&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #050505; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .subtitle-overlay { position: absolute; bottom: 8%; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 50; }
        #subtitleText { font-family: 'Oswald', sans-serif; font-size: 0.5rem; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px; display: none; line-height: 1.2; }
        .control-btn { transition: 0.2s; border: 1px solid #333; font-weight: 900; text-transform: uppercase; font-size: 10px; border-radius: 8px; padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .sidebar-item { border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; padding: 12px; font-size: 11px; margin-bottom: 6px; border: 1px solid transparent; background: #151515; color: #999; }
        .active-niche { background-color: #272727 !important; border-color: #f00 !important; color: #f00 !important; }
        .scene-dot { width: 8px; height: 8px; border-radius: 50%; background: #222; cursor: pointer; border: 1px solid #333; }
        .scene-dot.active { background: #f00; box-shadow: 0 0 10px #f00; }
        .scene-dot.loaded { border-color: #059669; background: #064e3b; }
    </style>
</head>
<body class="p-2 md:p-6" onload="initApp()">

    <div class="w-full max-w-[1400px] mx-auto mb-4 flex items-center justify-between p-2">
        <div class="flex items-center gap-2">
            <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
            </div>
            <h1 class="text-lg font-black tracking-tighter uppercase italic">AutoTube <span class="text-[9px] not-italic text-gray-500">v7.0 POWER</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="saveCurrentProject()" class="text-[8px] font-black uppercase bg-[#111] border border-[#333] px-3 py-2 rounded">Save Project</button>
            <button onclick="loadLastProject()" class="text-[8px] font-black uppercase bg-[#111] border border-[#333] px-3 py-2 rounded">Load Last</button>
        </div>
    </div>

    <div class="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-4">
        
        <div class="w-full lg:w-1/3 space-y-4">
            <div class="card p-4 border-t-2 border-red-600">
                <h2 class="text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">1. Atmosphere</h2>
                <select id="moodSelect" class="w-full bg-black border border-[#333] p-3 rounded mb-4 text-xs font-bold text-red-500 outline-none">
                    <option value="Epic">EPIC CINEMATIC</option>
                    <option value="Suspense">DARK SUSPENSE</option>
                    <option value="Motivation">MOTIVATIONAL</option>
                </select>
                
                <h2 class="text-[10px] font-black text-gray-500 uppercase mb-2">2. My Niches</h2>
                <div id="nicheList" class="max-h-32 overflow-y-auto mb-3 space-y-1"></div>
                <div class="flex gap-2 mb-3">
                    <input id="nIn" type="text" placeholder="Add niche..." class="flex-1 bg-black border border-[#333] rounded p-2 text-xs outline-none">
                    <button onclick="addNewNiche()" class="bg-[#272727] px-4 rounded text-white font-bold">+</button>
                </div>
                <button onclick="genIdeas()" id="brainBtn" class="w-full yt-red py-3 rounded-lg font-black text-xs uppercase shadow-lg">Brainstorm</button>
                <div id="ideasGrid" class="mt-3 space-y-1"></div>
            </div>

            <div class="card p-4">
                <input id="groqKeyIn" type="password" class="w-full mb-2 bg-black border border-[#222] text-[10px] p-2 rounded outline-none" onchange="saveKeys()" placeholder="Groq API Key">
                <input id="pexelsKeyIn" type="password" class="w-full mb-2 bg-black border border-[#222] text-[10px] p-2 rounded outline-none" onchange="saveKeys()" placeholder="Pexels API Key">
            </div>
        </div>

        <div class="w-full lg:w-2/3 space-y-4">
            <div class="card p-4 md:p-6 border-b-2 border-red-600">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-black uppercase truncate text-red-500" id="autoStatus">READY TO CREATE</h2>
                    <button onclick="genFullProduction()" id="prodBtn" class="bg-emerald-600 px-6 py-2 rounded-full text-[10px] font-black uppercase">Launch Production</button>
                </div>

                <div class="player-stage mb-4" id="exportArea">
                    <div id="mainMediaBox" class="w-full h-full flex items-center justify-center text-center text-gray-400 font-bold text-[10px] uppercase px-4 italic">Studio Monitor Active</div>
                    <div class="subtitle-overlay"><div id="subtitleText"></div></div>
                    <div class="absolute top-2 right-2">
                        <span id="sceneIndicator" class="bg-black/90 px-2 py-1 rounded text-[8px] font-bold text-red-500 border border-white/10 uppercase">0/20</span>
                    </div>
                </div>

                <div id="sceneBar" class="flex justify-between gap-1 mb-4"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-black p-4 rounded-xl border border-[#222] space-y-3">
                        <div class="flex justify-between mb-1"><label class="text-[8px] text-gray-500 font-black uppercase">Voice Speed</label><span id="rateVal" class="text-[8px] text-red-500">0.9x</span></div>
                        <input type="range" id="vRate" min="0.5" max="1.5" step="0.1" value="0.9" class="w-full" oninput="document.getElementById('rateVal').innerText=this.value+'x'">
                        
                        <div class="flex justify-between mb-1"><label class="text-[8px] text-gray-500 font-black uppercase">Ambience</label><span id="volVal" class="text-[8px] text-red-500">20%</span></div>
                        <input type="range" id="bgVol" min="0" max="0.5" step="0.05" value="0.2" class="w-full" oninput="updateMusicVol(this.value)">
                    </div>
                    <div class="space-y-2">
                        <select id="voiceSelect" class="w-full bg-black border border-[#222] text-[10px] text-red-500 font-bold p-3 rounded outline-none uppercase"></select>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="playFullSequence()" class="control-btn bg-white text-black">▶ PREVIEW</button>
                            <button onclick="pauseSpeech()" class="control-btn bg-[#111] text-white">⏸ PAUSE</button>
                            <button onclick="startExport()" class="col-span-2 control-btn bg-red-600 text-white py-4 shadow-xl">🎬 EXPORT MP4 (HD)</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <audio id="bgAtmosphere" loop></audio>
    <script>
    let niches = ["African Folk Tales", "Success Psychology", "Bible History", "AI Tech Trends"];
    let curN = niches[0];
    let scenes = []; 
    let currentIdx = 0;
    const synth = window.speechSynthesis;
    let mediaRecorder;
    let recordedChunks = [];

    const audioLibrary = {
        "Epic": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        "Suspense": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
        "Motivation": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
    };

    function initApp() {
        document.getElementById('groqKeyIn').value = localStorage.getItem('groq_key') || "";
        document.getElementById('pexelsKeyIn').value = localStorage.getItem('pexels_key') || "";
        const saved = localStorage.getItem('myNiches');
        if(saved) {
            const parsed = JSON.parse(saved);
            if(parsed && parsed.length > 0) { niches = parsed; curN = niches[0]; }
        }
        renderNicheUI();
        renderSceneBar();
        setTimeout(loadVoices, 500);
    }

    function saveKeys() {
        localStorage.setItem('groq_key', document.getElementById('groqKeyIn').value);
        localStorage.setItem('pexels_key', document.getElementById('pexelsKeyIn').value);
    }

    // --- CLEAN JSON PARSER (THE "MAGNET") ---
    function parseCleanJson(rawText) {
        try {
            const start = rawText.indexOf('[');
            const end = rawText.lastIndexOf(']');
            if (start !== -1 && end !== -1) {
                return JSON.parse(rawText.substring(start, end + 1));
            }
            return JSON.parse(rawText);
        } catch (e) { 
            console.error("JSON Parse Error", e);
            return null; 
        }
    }

    function renderNicheUI() {
        const list = document.getElementById('nicheList');
        if(!list) return;
        list.innerHTML = niches.map((n, i) => `
            <div onclick="selectNiche('${n.replace(/'/g, "\\'")}')" class="sidebar-item ${n === curN ? 'active-niche' : ''}">
                <span class="truncate uppercase font-black text-[9px] tracking-widest">${n}</span>
                <span onclick="deleteNiche(${i},event)" class="px-1 hover:text-red-500">×</span>
            </div>`).join('');
    }

    function selectNiche(n) { synth.cancel(); curN = n; renderNicheUI(); }

    function addNewNiche() {
        const val = document.getElementById('nIn').value.trim();
        if(val) { 
            niches.push(val); localStorage.setItem('myNiches', JSON.stringify(niches)); 
            document.getElementById('nIn').value = ""; curN = val; renderNicheUI(); 
        }
    }

    function deleteNiche(index, event) {
        event.stopPropagation(); niches.splice(index, 1);
        if(!niches.length) niches = ["General"];
        localStorage.setItem('myNiches', JSON.stringify(niches));
        curN = niches[0]; renderNicheUI();
    }

    // --- BRAINSTORM LOGIC (THE BRAIN) ---
    async function genIdeas() {
        const btn = document.getElementById('brainBtn');
        const grid = document.getElementById('ideasGrid');
        const key = document.getElementById('groqKeyIn').value;
        if(!key) return alert("Enter Groq Key!");

        btn.innerText = "THINKING...";
        grid.innerHTML = "<div class='text-[9px] animate-pulse text-red-600 text-center font-black'>SYNCING...</div>";
        
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", 
                    messages: [
                        {role: "system", content: "Return ONLY a raw JSON array of 5 viral titles. No conversational text, no intro."},
                        {role: "user", content: `Generate 5 viral YouTube titles for the niche: ${curN}. Format: ["Title 1", "Title 2"]`}
                    ]
                })
            });
            const d = await r.json();
            const titles = parseCleanJson(d.choices[0].message.content);
            
            if(!titles || !Array.isArray(titles)) throw new Error("Format error");
            
            grid.innerHTML = titles.map(t => `<div onclick="prepStudio('${t.replace(/'/g, "\\'")}')" class="sidebar-item bg-black/40 text-[9px] truncate">${t}</div>`).join('');
            btn.innerText = "BRAINSTORM";
        } catch(e) { 
            btn.innerText = "RETRY";
            grid.innerHTML = "<div class='text-[8px] text-gray-600'>Check API Key or connection.</div>";
        }
    }

    function prepStudio(title) { 
        document.getElementById('autoStatus').innerText = title.toUpperCase(); 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    }

    // --- FULL PRODUCTION LOGIC ---
    async function genFullProduction() {
        const btn = document.getElementById('prodBtn');
        const status = document.getElementById('autoStatus');
        const gKey = document.getElementById('groqKeyIn').value;
        const pKey = document.getElementById('pexelsKeyIn').value;
        if(!gKey || !pKey) return alert("Keys Missing!");
        
        btn.innerText = "⚡ FILMING...";
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${gKey}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", 
                    messages: [
                        {role: "system", content: "Return ONLY a raw JSON array, no conversational text. 20 scenes."},
                        {role: "user", content: `Script for: "${status.innerText}". FORMAT: [{"v_prompt": "visual keyword", "narration": "text"}]`}
                    ]
                })
            });
            const d = await r.json();
            scenes = parseCleanJson(d.choices[0].message.content);
            
            currentIdx = 0;
            for(let i=0; i<scenes.length; i++) {
                status.innerText = `FETCHING SCENE ${i+1}/20...`;
                await fetchMedia(i, pKey);
                renderSceneBar();
                if(currentIdx === i) updatePlayer();
            }
            btn.innerText = "READY";
            status.innerText = "PRODUCTION COMPLETE";
        } catch(e) { btn.innerText = "RETRY"; }
    }

    async function fetchMedia(i, pKey) {
        try {
            const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(scenes[i].v_prompt)}&per_page=1`, { headers: { Authorization: pKey } });
            const p = await res.json();
            scenes[i].mUrl = p.videos?.[0]?.video_files?.[0]?.link;
            scenes[i].mType = scenes[i].mUrl ? 'video' : 'image';
            if(!scenes[i].mUrl) scenes[i].mUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(scenes[i].v_prompt)}?width=1280&height=720&nologo=true`;
        } catch (e) { scenes[i].mUrl = `https://image.pollinations.ai/prompt/scenery?width=1280&height=720`; }
    }

    function updatePlayer() {
        if(!scenes[currentIdx]) return;
        const s = scenes[currentIdx];
        document.getElementById('sceneIndicator').innerText = `${currentIdx + 1} / 20`;
        document.getElementById('subtitleText').innerText = s.narration;
        const box = document.getElementById('mainMediaBox');
        box.innerHTML = s.mType === 'video' ? `<video src="${s.mUrl}" autoplay loop muted playsinline></video>` : `<img src="${s.mUrl}">`;
    }

    function renderSceneBar() {
        const bar = document.getElementById('sceneBar');
        bar.innerHTML = "";
        for(let i=0; i<20; i++) {
            const dot = document.createElement('div');
            dot.className = `scene-dot ${i === currentIdx ? 'active' : ''} ${scenes[i]?.mUrl ? 'loaded' : ''}`;
            dot.onclick = () => { currentIdx = i; updatePlayer(); renderSceneBar(); };
            bar.appendChild(dot);
        }
    }

    function loadVoices() {
        const vS = document.getElementById('voiceSelect');
        const voices = synth.getVoices();
        vS.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
    }

    function updateMusicVol(val) { document.getElementById('bgAtmosphere').volume = val; document.getElementById('volVal').innerText = Math.round(val * 100) + "%"; }

    async function speakActive() {
        if(!scenes[currentIdx]) return;
        synth.cancel();
        const m = new SpeechSynthesisUtterance(scenes[currentIdx].narration);
        m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
        m.rate = document.getElementById('vRate').value;
        m.onstart = () => { document.getElementById('subtitleText').style.display = 'inline-block'; };
        return new Promise(resolve => { m.onend = resolve; synth.speak(m); });
    }

    async function playFullSequence() {
        const bg = document.getElementById('bgAtmosphere');
        bg.src = audioLibrary[document.getElementById('moodSelect').value];
        bg.volume = document.getElementById('bgVol').value;
        bg.play();
        for(let i=0; i < scenes.length; i++) {
            currentIdx = i; updatePlayer(); renderSceneBar();
            await speakActive();
        }
        bg.pause();
    }

    async function startExport() {
        if(!scenes.length) return alert("Generate video first!");
        alert("Select 'This Tab' and ensure 'Share System Audio' is ON to capture the narration.");
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'AutoTube_Viral_Video.mp4';
                a.click();
            };
            mediaRecorder.start();
            await playFullSequence();
            mediaRecorder.stop();
        } catch(e) { console.log("Export Cancelled"); }
    }

    function saveCurrentProject() {
        if(!scenes.length) return;
        localStorage.setItem('autoTube_Project', JSON.stringify({ scenes, curN, title: document.getElementById('autoStatus').innerText }));
        alert("Project Saved Locally");
    }

    function loadLastProject() {
        const p = JSON.parse(localStorage.getItem('autoTube_Project'));
        if(p) { 
            scenes = p.scenes; 
            curN = p.curN; 
            document.getElementById('autoStatus').innerText = p.title; 
            currentIdx = 0;
            updatePlayer(); 
            renderSceneBar(); 
            renderNicheUI();
        }
    }

    function pauseSpeech() { synth.cancel(); document.getElementById('bgAtmosphere').pause(); }
</script>
</body>
</html>
