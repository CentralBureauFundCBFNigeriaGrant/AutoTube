<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .yt-red { background-color: #f00; }
        .yt-red-text { color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        .sidebar-item { border-radius: 8px; transition: 0.2s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 12px; font-size: 13px; }
        .sidebar-item:hover { background-color: #272727; }
        .active-niche { background-color: #272727; border-left: 4px solid #f00; color: #f00; font-weight: bold; }
        .timeline-box { min-width: 280px; background-color: #121212; border: 1px solid #282828; border-radius: 12px; padding: 15px; }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } }
        ::-webkit-scrollbar { height: 5px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card p-4 flex items-center gap-3">
                <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                    <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">AutoTube</h1>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Voice DNA</h2>
                <button id="recBtn" onclick="handleMic()" class="w-full border border-[#333] py-3 rounded-xl text-[11px] font-bold hover:bg-[#272727] flex items-center justify-center gap-2">
                    <div id="micDot" class="w-2 h-2 bg-gray-600 rounded-full"></div> 
                    <span id="recText">RECORD DNA</span>
                </button>
                <div id="vPlayback" class="hidden mt-4 space-y-2">
                    <audio id="vAudio" controls class="h-8 w-full"></audio>
                    <div class="flex gap-2">
                        <button onclick="saveV()" class="flex-1 bg-emerald-700 text-[10px] py-2 rounded-lg font-bold">SAVE</button>
                        <button onclick="discardV()" class="flex-1 bg-zinc-800 text-[10px] py-2 rounded-lg font-bold">TRASH</button>
                    </div>
                </div>
                <input id="hfKey" type="password" placeholder="HF Token (Free Key)" class="w-full bg-black border border-[#282828] rounded-xl p-3 text-[10px] mt-4 text-emerald-500 font-mono">
                <p class="text-[9px] text-gray-600 mt-2 px-1">Using Hugging Face for free voices.</p>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Niches</h2>
                <div id="nicheList" class="space-y-1"></div>
                <div class="flex gap-2 mt-4">
                    <input id="nIn" type="text" placeholder="Add..." class="w-full bg-black border border-[#282828] rounded-lg p-2 text-xs">
                    <button onclick="addN()" class="bg-[#272727] px-4 rounded-lg text-white font-bold">+</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-red-600">
                <div>
                    <h2 class="text-2xl font-black">Content Engine</h2>
                    <p class="text-[10px] text-gray-500 uppercase">Active Niche: <span id="activeNText" class="yt-red-text font-bold"></span></p>
                </div>
                <button onclick="genIdeas()" class="yt-red px-10 py-4 rounded-full font-black text-sm hover:scale-105 transition-all">
                    GENERATE IDEAS
                </button>
            </div>

            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div id="studioRoom" class="hidden card p-6 border-t-2 border-red-600 shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-[10px] font-black tracking-widest">PRODUCTION STUDIO</h2>
                    <div class="flex gap-3">
                        <button onclick="genScript()" id="sBtn" class="bg-[#272727] px-6 py-2 rounded-xl text-[10px] font-black uppercase">1. Script</button>
                        <button onclick="syncVoice()" id="vBtn" class="yt-red px-6 py-2 rounded-xl text-[10px] font-black uppercase">2. Sync Voice</button>
                    </div>
                </div>
                <div class="flex overflow-x-auto gap-5 pb-6 mb-6" id="timeline"></div>
                <div class="bg-black p-4 rounded-xl border border-[#282828]">
                    <div id="scriptOut" class="text-xs text-gray-400 font-mono h-32 overflow-y-auto leading-relaxed"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        // We'll use Hugging Face for free TTS now
        const DEFAULT_HF_MODEL = "facebook/mms-tts-eng"; 

        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["AI Business"];
        let curN = niches[0];
        let scenes = [];
        let recorder;
        let chunks = [];

        function init() { renderN(); selN(curN); }

        // --- MIC ---
        async function handleMic() {
            const btn = document.getElementById('recBtn');
            const dot = document.getElementById('micDot');
            if (!recorder || recorder.state === "inactive") {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s);
                chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
                recorder.onstop = () => {
                    const b = new Blob(chunks, { type: 'audio/mpeg' });
                    document.getElementById('vAudio').src = URL.createObjectURL(b);
                    document.getElementById('vPlayback').classList.remove('hidden');
                };
                recorder.start();
                btn.classList.add('pulse-red', 'border-red-600');
                dot.classList.replace('bg-gray-600', 'bg-red-600');
                document.getElementById('recText').innerText = "RECORDING...";
            } else {
                recorder.stop();
                btn.classList.remove('pulse-red', 'border-red-600');
                dot.classList.replace('bg-red-600', 'bg-emerald-500');
                document.getElementById('recText').innerText = "CAPTURED";
            }
        }
        function discardV() { document.getElementById('vPlayback').classList.add('hidden'); document.getElementById('recText').innerText = "RECORD DNA"; }
        function saveV() { alert("Voice Saved Locally!"); document.getElementById('vPlayback').classList.add('hidden'); }

        // --- NICHES ---
        function addN() { const v = document.getElementById('nIn').value.trim(); if(v){ niches.push(v); saveN(); renderN(); } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); saveN(); renderN(); }
        function saveN() { localStorage.setItem('myNiches', JSON.stringify(niches)); }
        function renderN() {
            document.getElementById('nicheList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}">
                    <span>${n}</span><span onclick="delN(${i},event)" class="text-gray-600 hover:text-red-500">🗑️</span>
                </div>`).join('');
        }
        function selN(n) { curN = n; document.getElementById('activeNText').innerText = n.toUpperCase(); renderN(); }

        // --- ENGINE ---
        async function genIdeas() {
            const g = document.getElementById('ideasGrid');
            g.innerHTML = "<p class='p-10 text-gray-600 text-center col-span-2 italic animate-pulse'>Thinking...</p>";
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.1-8b-instant", messages: [{role: "user", content: `5 viral short titles for ${curN}. Return ONLY raw JSON array: ["Title 1", "Title 2"]`}]})
            });
            const d = await r.json();
            let txt = d.choices[0].message.content.replace(/```json/gi, '').replace(/```/gi, '').trim();
            const t = JSON.parse(txt);
            g.innerHTML = t.map(x => `
                <div onclick="openStudio('${x.replace(/'/g, "\\'")}')" class="card p-5 hover:border-red-600 cursor-pointer transition-all">
                    <h3 class="font-bold text-sm">${x}</h3>
                    <p class="text-[9px] yt-red-text mt-3 font-black">PRODUCE →</p>
                </div>`).join('');
        }

        function openStudio(t) { 
            document.getElementById('studioRoom').classList.remove('hidden'); 
            document.getElementById('timeline').innerHTML = `<div class='p-10 text-gray-500 text-xs italic'>Studio Ready: ${t}</div>`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); 
        }

        async function genScript() {
            const btn = document.getElementById('sBtn'); btn.innerText = "...";
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.1-8b-instant", messages: [{role: "user", content: `Write 4 lines for ${curN}. Format: [S1] text [S2] text [S3] text [S4] text.`}]})
            });
            const d = await r.json();
            const s = d.choices[0].message.content;
            document.getElementById('scriptOut').innerText = s;
            scenes = s.split(/\[S\d\]/i).filter(x => x.trim().length > 5);
            document.getElementById('timeline').innerHTML = scenes.map((x, i) => `
                <div class="timeline-box">
                    <p class="text-[9px] text-gray-500 font-black mb-2 uppercase">Scene ${i+1}</p>
                    <p class="text-[11px] text-white line-clamp-3 italic">"${x.trim()}"</p>
                    <div id="v-slot-${i}" class="mt-4 bg-black p-3 rounded-lg border border-[#282828] text-[9px] text-gray-600 italic">Waiting for sync...</div>
                </div>`).join('');
            btn.innerText = "1. SCRIPT";
        }

        async function syncVoice() {
            const hfToken = document.getElementById('hfKey').value;
            if(!hfToken) { alert("Please enter your Free Hugging Face Token first!"); return; }
            
            const btn = document.getElementById('vBtn'); btn.innerText = "SYNCING...";
            for(let i=0; i<scenes.length; i++) {
                const slot = document.getElementById(`v-slot-${i}`);
                slot.innerHTML = "<span class='yt-red-text animate-pulse font-bold'>GENERATING AUDIO...</span>";
                try {
                    const r = await fetch(`https://api-inference.huggingface.co/models/${DEFAULT_HF_MODEL}`, {
                        method: "POST", 
                        headers: {"Authorization": `Bearer ${hfToken}`, "Content-Type": "application/json"},
                        body: JSON.stringify({inputs: scenes[i].trim()})
                    });
                    const b = await r.blob();
                    if(b.size < 500) throw new Error("API Limit or Error");
                    slot.innerHTML = `<audio controls class="h-7 w-full"><source src="${URL.createObjectURL(b)}"></audio>`;
                } catch(e) { slot.innerText = "Sync Error - Check Token"; }
            }
            btn.innerText = "2. SYNC VOICE";
        }

        init();
    </script>
</body>
    </html>
