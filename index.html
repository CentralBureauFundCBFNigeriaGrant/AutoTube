<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube | Cinematic Studio v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        .sidebar-item { border-radius: 8px; transition: 0.2s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 10px; font-size: 12px; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #272727; }
        .active-niche { background-color: #272727; border-left: 4px solid #f00; color: #f00; font-weight: bold; }
        
        /* The Cinematic Player */
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #333; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .scene-nav-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 12px; border-radius: 50%; color: white; transition: 0.3s; border: 1px solid #444; }
        .scene-nav-btn:hover { background: #f00; border-color: #f00; }
        
        .key-input { background: #000; border: 1px solid #333; color: #666; font-size: 10px; padding: 6px; border-radius: 6px; width: 100%; outline: none; }
        .key-input:focus { border-color: #f00; color: #fff; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6" onload="init()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card p-4 flex items-center gap-3">
                <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                    <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">AutoTube</h1>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest text-center">Voice Lab</h2>
                <div class="bg-black p-3 rounded-lg border border-[#282828] mb-4">
                    <select id="voiceSelect" class="w-full bg-black text-[11px] text-red-500 border-none outline-none"></select>
                </div>
                <button onclick="testVoice()" class="w-full border border-[#333] py-2 rounded-xl text-[10px] font-bold hover:bg-[#272727]">TEST VOICE</button>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest text-center">Niches</h2>
                <div id="nicheList" class="max-h-32 overflow-y-auto mb-4"></div>
                <div class="flex gap-2">
                    <input id="nIn" type="text" placeholder="Add..." class="w-full bg-black border border-[#282828] rounded-lg p-2 text-xs outline-none">
                    <button onclick="addN()" class="bg-[#272727] px-4 rounded-lg text-white">+</button>
                </div>
            </div>

            <div class="card p-5 border-t-2 border-red-600">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Master Keys</h2>
                <div class="space-y-3">
                    <input id="groqKeyIn" type="password" class="key-input" onchange="saveKeys()" placeholder="Groq Key (gsk_...)">
                    <input id="pexelsKeyIn" type="password" class="key-input" onchange="saveKeys()" placeholder="Pexels Key">
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            
            <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-red-600">
                <div>
                    <h2 class="text-2xl font-black tracking-tight">CONTENT ENGINE</h2>
                    <p class="text-[10px] text-gray-500 uppercase">Current Niche: <span id="activeNText" class="text-red-600"></span></p>
                </div>
                <button onclick="genIdeas()" class="yt-red px-10 py-4 rounded-full font-black text-sm hover:scale-105 transition-all shadow-xl">GENERATE IDEAS</button>
            </div>

            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div id="studioRoom" class="hidden space-y-6">
                
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-[10px] font-black tracking-widest uppercase">Cinematic Stage</h2>
                        <div class="flex gap-2">
                            <button onclick="genScript()" id="sBtn" class="bg-[#272727] px-4 py-2 rounded-lg text-[9px] font-black uppercase">1. Write Script</button>
                            <button onclick="playFullSequence()" id="playAllBtn" class="bg-emerald-600 px-4 py-2 rounded-lg text-[9px] font-black uppercase">2. Play Sequence</button>
                        </div>
                    </div>

                    <div class="player-stage group">
                        <div id="mainMediaBox" class="w-full h-full flex items-center justify-center text-gray-800 font-black text-xl italic">
                            READY TO LOAD SCENES
                        </div>
                        
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="prevScene()" class="scene-nav-btn">←</button>
                        </div>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="nextScene()" class="scene-nav-btn">→</button>
                        </div>
                        
                        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/80 px-4 py-2 rounded-full border border-white/10">
                            <span id="sceneIndicator" class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Scene 0 / 0</span>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2 bg-black p-4 rounded-xl border border-[#282828]">
                            <p class="text-[9px] text-gray-500 font-bold mb-2 uppercase">Scene Narration</p>
                            <div id="currentSceneText" class="text-sm italic leading-relaxed text-gray-300">"Select or generate a script to begin..."</div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button id="genMotionBtn" onclick="genActiveVisual()" class="flex-1 bg-white text-black font-black text-[10px] rounded-xl uppercase py-4">Generate Motion</button>
                            <button onclick="speakActive()" class="flex-1 border border-[#333] text-white font-black text-[10px] rounded-xl uppercase">Preview Audio</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["Bible Stories", "Success Mindset"];
        let curN = niches[0];
        let scenes = []; // Array of { text: "", keywords: "", mediaType: "", mediaUrl: "" }
        let currentIdx = 0;
        const synth = window.speechSynthesis;

        function init() {
            document.getElementById('groqKeyIn').value = localStorage.getItem('groq_key') || "";
            document.getElementById('pexelsKeyIn').value = localStorage.getItem('pexels_key') || "";
            renderN(); selN(curN); setTimeout(loadVoices, 500);
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groqKeyIn').value);
            localStorage.setItem('pexels_key', document.getElementById('pexelsKeyIn').value);
        }

        function loadVoices() {
            const select = document.getElementById('voiceSelect');
            const voices = synth.getVoices();
            select.innerHTML = voices
                .sort((a, b) => a.lang.localeCompare(b.lang))
                .map(v => `<option value="${v.name}">${v.name.includes('Google') ? '⭐ ' : ''}[${v.lang}] ${v.name}</option>`).join('');
        }

        // --- CLEAN SPEECH LOGIC ---
        function getCleanText(text) {
            // This strips [S1], (Keywords), Narrator:, Host:, etc.
            return text
                .replace(/\[.*?\]/g, '') // Remove brackets
                .replace(/\(.*?\)/g, '') // Remove parentheses
                .replace(/Narrator:|Host:|Speaker:|Scene \d:/gi, '') // Remove labels
                .trim();
        }

        function speakActive() {
            if(!scenes[currentIdx]) return;
            synth.cancel();
            const clean = getCleanText(scenes[currentIdx].text);
            const m = new SpeechSynthesisUtterance(clean);
            m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            m.rate = 0.95;
            synth.speak(m);
        }

        // --- PRODUCTION ENGINE ---
        async function genScript() {
            const btn = document.getElementById('sBtn'); btn.innerText = "WRITING...";
            const key = document.getElementById('groqKeyIn').value;
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Write 5 cinematic scenes for a YouTube short about ${curN}. Format exactly: [S1] (Visual Keywords) Narrator Text...`}]
                    })
                });
                const d = await r.json();
                const raw = d.choices[0].message.content;
                
                // Parse script into scene objects
                const rawParts = raw.split(/\[S\d\]/i).filter(p => p.trim().length > 10);
                scenes = rawParts.map(p => {
                    const kw = p.match(/\(([^)]+)\)/) ? p.match(/\(([^)]+)\)/)[1] : curN;
                    return { text: p, keywords: kw, mediaType: 'none', mediaUrl: '' };
                });

                currentIdx = 0;
                updatePlayer();
            } catch(e) { alert("Script Error. Check Key."); }
            btn.innerText = "1. WRITE SCRIPT";
        }

        async function genActiveVisual() {
            const btn = document.getElementById('genMotionBtn');
            const scene = scenes[currentIdx];
            btn.innerText = "SEARCHING...";
            const pKey = document.getElementById('pexelsKeyIn').value;

            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(scene.keywords)}&per_page=1`, {
                    headers: { Authorization: pKey }
                });
                const data = await res.json();
                if (data.videos?.length > 0) {
                    scene.mediaType = 'video';
                    scene.mediaUrl = data.videos[0].video_files.find(f => f.width >= 1280)?.link || data.videos[0].video_files[0].link;
                } else { throw new Error(); }
            } catch (e) {
                scene.mediaType = 'image';
                scene.mediaUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent('Cinematic 8k: ' + scene.keywords)}?width=1280&height=720&nologo=true`;
            }
            updatePlayer();
            btn.innerText = "GENERATE MOTION";
        }

        function updatePlayer() {
            const scene = scenes[currentIdx];
            const box = document.getElementById('mainMediaBox');
            const indicator = document.getElementById('sceneIndicator');
            const textDisplay = document.getElementById('currentSceneText');

            indicator.innerText = `Scene ${currentIdx + 1} / ${scenes.length}`;
            textDisplay.innerText = `"${getCleanText(scene.text)}"`;

            if (scene.mediaUrl === '') {
                box.innerHTML = `<div class="text-gray-700 uppercase text-xs">No Visual Generated Yet</div>`;
            } else if (scene.mediaType === 'video') {
                box.innerHTML = `<video src="${scene.mediaUrl}" autoplay loop muted></video>`;
            } else {
                box.innerHTML = `<img src="${scene.mediaUrl}">`;
            }
        }

        // --- NAVIGATION ---
        function nextScene() { if(currentIdx < scenes.length - 1) { currentIdx++; updatePlayer(); } }
        function prevScene() { if(currentIdx > 0) { currentIdx--; updatePlayer(); } }

        async function playFullSequence() {
            const btn = document.getElementById('playAllBtn');
            btn.innerText = "PLAYING...";
            for(let i=0; i < scenes.length; i++) {
                currentIdx = i;
                updatePlayer();
                speakActive();
                await new Promise(r => {
                    const check = setInterval(() => { if(!synth.speaking){ clearInterval(check); r(); } }, 500);
                });
            }
            btn.innerText = "2. PLAY SEQUENCE";
        }

        // --- CORE UI ---
        function selN(n) { curN = n; document.getElementById('activeNText').innerText = n.toUpperCase(); renderN(); }
        function addN() { const v = document.getElementById('nIn').value; if(v){ niches.push(v); saveN(); renderN(); document.getElementById('nIn').value=""; } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); saveN(); renderN(); }
        function saveN() { localStorage.setItem('myNiches', JSON.stringify(niches)); }
        function renderN() {
            document.getElementById('nicheList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}">
                    <span class="truncate">${n}</span>
                    <span onclick="delN(${i},event)" class="text-gray-600 hover:text-red-500">🗑️</span>
                </div>`).join('');
        }
        function testVoice() {
            const m = new SpeechSynthesisUtterance("AutoTube System Online.");
            m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            synth.speak(m);
        }
        function openStudio() { document.getElementById('studioRoom').classList.remove('hidden'); window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
        
        async function genIdeas() {
            const g = document.getElementById('ideasGrid');
            const key = document.getElementById('groqKeyIn').value;
            g.innerHTML = "<div class='col-span-2 text-center py-10'><div class='animate-spin inline-block w-6 h-6 border-2 border-red-600 border-t-transparent rounded-full mb-2'></div><p class='text-[10px] text-gray-500 uppercase'>Consulting Brain...</p></div>";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Give me 5 viral short titles for ${curN}. Return JSON array only: ["Title", "Title"]`}]
                    })
                });
                const d = await r.json();
                const t = JSON.parse(d.choices[0].message.content.match(/\[.*\]/s)[0]);
                g.innerHTML = t.map(x => `
                    <div onclick="openStudio()" class="card p-6 hover:border-red-600 cursor-pointer border-l-4 border-transparent active:scale-95">
                        <h3 class="font-bold text-sm mb-2">${x}</h3>
                        <p class="text-[9px] text-red-600 font-black uppercase tracking-widest">Start Production →</p>
                    </div>`).join('');
            } catch(e) { g.innerHTML = "<p class='col-span-2 text-center text-red-500 text-xs'>Error. Check Groq Key.</p>"; }
        }
    </script>
</body>
</html>
