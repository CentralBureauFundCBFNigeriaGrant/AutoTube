<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoTube | v5.9 Director's Cut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Oswald:wght@700&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #050505; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        
        /* CINEMATIC SUBTITLES */
        .subtitle-overlay { position: absolute; bottom: 10%; left: 0; width: 100%; text-align: center; pointer-events: none; padding: 0 20px; z-index: 50; }
        #subtitleText { font-family: 'Oswald', sans-serif; font-size: 0.8rem; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0px 2px 5px rgba(0,0,0,1); line-height: 1.2; display: inline-block; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; }

        .control-btn { transition: 0.2s; border: 1px solid #333; font-weight: 900; text-transform: uppercase; font-size: 10px; border-radius: 8px; padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .sidebar-item { border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; padding: 12px; font-size: 11px; margin-bottom: 6px; border: 1px solid transparent; background: #151515; color: #999; }
        .active-niche { background-color: #272727 !important; border-color: #f00 !important; color: #f00 !important; }
        .wrap-text { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }
    </style>
</head>
<body class="p-2 md:p-6" onload="initApp()">

    <div class="w-full max-w-[1400px] mx-auto mb-4 flex items-center justify-between p-2">
        <div class="flex items-center gap-2">
            <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
            </div>
            <h1 class="text-lg font-black tracking-tighter uppercase italic">AutoTube <span class="text-[9px] not-italic text-gray-500">v5.9 PRO</span></h1>
        </div>
    </div>

    <div class="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-4">
        <div class="w-full lg:w-1/3 space-y-4">
            <div class="card p-4 border-t-2 border-red-600">
                <h2 class="text-[10px] font-black text-gray-500 uppercase mb-3">1. Niches</h2>
                <div id="nicheList" class="max-h-48 overflow-y-auto mb-3 space-y-1"></div>
                <div class="flex gap-2 mb-3">
                    <input id="nIn" type="text" placeholder="Add niche..." class="flex-1 bg-black border border-[#333] rounded p-2 text-xs outline-none">
                    <button onclick="addNewNiche()" class="bg-[#272727] px-4 rounded">+</button>
                </div>
                <button onclick="genIdeas()" class="w-full yt-red py-3 rounded-lg font-black text-xs uppercase shadow-lg">Brainstorm</button>
                <div id="ideasGrid" class="mt-3 space-y-1"></div>
            </div>
            <div class="card p-4">
                <input id="groqKeyIn" type="password" class="w-full mb-2 bg-black border border-[#222] text-[10px] p-2 rounded" onchange="saveKeys()" placeholder="Groq Key">
                <input id="pexelsKeyIn" type="password" class="w-full bg-black border border-[#222] text-[10px] p-2 rounded" onchange="saveKeys()" placeholder="Pexels Key">
            </div>
        </div>

        <div class="w-full lg:w-2/3 space-y-4">
            <div class="card p-4 md:p-6 border-b-2 border-red-600">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-black uppercase text-red-500" id="autoStatus">READY</h2>
                    <button onclick="genFullProduction()" id="prodBtn" class="bg-emerald-600 px-6 py-2 rounded-full text-[10px] font-black uppercase">Launch Production</button>
                </div>

                <div class="player-stage mb-4">
                    <div id="mainMediaBox" class="w-full h-full flex items-center justify-center text-center text-gray-700 font-bold text-[9px] uppercase px-4">Theater Ready</div>
                    <div class="subtitle-overlay"><div id="subtitleText"></div></div>
                    <div class="absolute top-2 right-2">
                        <span id="sceneIndicator" class="bg-black/90 px-2 py-1 rounded text-[8px] font-bold text-red-500 border border-white/10 uppercase">0/20</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-black p-4 rounded-xl border border-[#222]">
                        <p class="text-[9px] text-gray-500 font-black mb-2 uppercase">Current Script</p>
                        <div id="currentSceneText" class="text-xs italic text-white wrap-text min-h-[40px]">---</div>
                    </div>
                    <div class="space-y-2">
                        <select id="voiceSelect" class="w-full bg-black border border-[#222] text-xs text-red-500 font-bold p-2 rounded"></select>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="speakActive()" class="control-btn bg-white text-black">▶ VOICE</button>
                            <button onclick="pauseSpeech()" class="control-btn bg-[#111] text-white">⏸ PAUSE</button>
                            <button onclick="playFullSequence()" class="col-span-2 control-btn bg-red-600 text-white py-3 shadow-lg">🎬 BROADCAST FULL 20</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
    <script>
    let niches = ["African Folk Tales", "Bible History", "Modern AI Tech", "Luxury Lifestyle"];
    let curN = niches[0];
    let scenes = []; 
    let currentIdx = 0;
    const synth = window.speechSynthesis;

    function initApp() {
        document.getElementById('groqKeyIn').value = localStorage.getItem('groq_key') || "";
        document.getElementById('pexelsKeyIn').value = localStorage.getItem('pexels_key') || "";
        const saved = localStorage.getItem('myNiches');
        if(saved) { const parsed = JSON.parse(saved); if(parsed.length > 0) niches = parsed; }
        renderNicheUI();
        document.getElementById('activeNText').innerText = curN.toUpperCase();
        setTimeout(loadVoices, 500);
    }

    function saveKeys() {
        localStorage.setItem('groq_key', document.getElementById('groqKeyIn').value);
        localStorage.setItem('pexels_key', document.getElementById('pexelsKeyIn').value);
    }

    function renderNicheUI() {
        const list = document.getElementById('nicheList');
        if(!list) return;
        list.innerHTML = niches.map((n, i) => `
            <div onclick="selectNiche('${n.replace(/'/g, "\\'")}')" class="sidebar-item ${n === curN ? 'active-niche' : ''}">
                <span class="truncate">${n}</span>
                <span onclick="deleteNiche(${i},event)">🗑️</span>
            </div>`).join('');
    }

    function selectNiche(n) { synth.cancel(); curN = n; renderNicheUI(); }

    function addNewNiche() {
        const input = document.getElementById('nIn');
        const val = input.value.trim();
        if(val) { niches.push(val); localStorage.setItem('myNiches', JSON.stringify(niches)); input.value = ""; renderNicheUI(); }
    }

    function deleteNiche(index, event) {
        event.stopPropagation(); niches.splice(index, 1);
        localStorage.setItem('myNiches', JSON.stringify(niches));
        if(niches.length > 0) curN = niches[0];
        renderNicheUI();
    }

    function parseCleanJson(rawText) {
        try {
            let clean = rawText.replace(/```json|```/gi, "").trim();
            const start = clean.indexOf('[');
            const end = clean.lastIndexOf(']');
            if (start !== -1 && end !== -1) return JSON.parse(clean.substring(start, end + 1));
            return JSON.parse(clean);
        } catch (e) { return null; }
    }

    async function genIdeas() {
        const g = document.getElementById('ideasGrid');
        const key = document.getElementById('groqKeyIn').value;
        if(!key) return alert("Keys Missing!");
        g.innerHTML = "<div class='text-[10px] animate-pulse text-red-600 text-center'>THINKING...</div>";
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", 
                    messages: [{role: "system", content: "Return ONLY JSON array of strings."}, {role: "user", content: `5 viral titles for: ${curN}.`}]
                })
            });
            const d = await r.json();
            const titles = parseCleanJson(d.choices[0].message.content);
            g.innerHTML = titles.map(t => `<div onclick="prepStudio('${t.replace(/'/g, "\\'")}')" class="sidebar-item bg-black/40 text-[10px] p-2 truncate">${t}</div>`).join('');
        } catch(e) { g.innerHTML = "Retry."; }
    }

    function prepStudio(title) {
        document.getElementById('autoStatus').innerText = title.toUpperCase();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function loadVoices() {
        const vS = document.getElementById('voiceSelect');
        const voices = synth.getVoices();
        if(!voices.length) { setTimeout(loadVoices, 300); return; }
        vS.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
    }

    function cleanScript(text) {
        return text.replace(/Scene \d+:?|\[S\d+\]|#+|\(.*?\)/gi, "").replace(/\*\*/g, "").trim();
    }

    async function genFullProduction() {
        const btn = document.getElementById('prodBtn');
        const status = document.getElementById('autoStatus');
        const gKey = document.getElementById('groqKeyIn').value;
        const pKey = document.getElementById('pexelsKeyIn').value;
        btn.innerText = "FILMING...";
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${gKey}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", 
                    messages: [
                        {role: "system", content: "You are a YouTube Script Bot. Return ONLY JSON. SCENE 10 MUST include: 'Make sure to subscribe for more'. SCENE 20 MUST end with: 'Like and Subscribe for the next episode'. Style: Cinematic."},
                        {role: "user", content: `Create 20 scenes for: "${status.innerText}". JSON: [{"v_prompt": "pexels keyword", "narration": "text"}]`}
                    ]
                })
            });
            const d = await r.json();
            scenes = parseCleanJson(d.choices[0].message.content);
            if(!scenes) throw new Error();
            
            currentIdx = 0; updatePlayer();
            for(let i=0; i<scenes.length; i++) {
                status.innerText = `SCENE ${i+1}/20...`;
                try {
                    const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(scenes[i].v_prompt)}&per_page=1`, { headers: { Authorization: pKey } });
                    const pData = await res.json();
                    if (pData.videos?.length > 0) {
                        scenes[i].mType = 'video';
                        scenes[i].mUrl = pData.videos[0].video_files.find(f => f.width >= 1280)?.link || pData.videos[0].video_files[0].link;
                    } else { throw new Error(); }
                } catch (e) {
                    scenes[i].mType = 'image';
                    scenes[i].mUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(scenes[i].v_prompt)}?width=1280&height=720&nologo=true`;
                }
                if(currentIdx === i) updatePlayer();
            }
            btn.innerText = "DONE";
        } catch(e) { alert("AI Error. Retry."); btn.innerText = "RETRY"; }
    }

    function updatePlayer() {
        if(!scenes[currentIdx]) return;
        const s = scenes[currentIdx];
        const cleanT = cleanScript(s.narration);
        document.getElementById('sceneIndicator').innerText = `${currentIdx + 1}/20`;
        document.getElementById('currentSceneText').innerText = cleanT;
        document.getElementById('subtitleText').innerText = cleanT;
        const box = document.getElementById('mainMediaBox');
        box.innerHTML = '';
        if (s.mType === 'video') box.innerHTML = `<video id="activeVideo" src="${s.mUrl}" autoplay loop muted playsinline></video>`;
        else box.innerHTML = `<img src="${s.mUrl}">`;
    }

    function speakActive() {
        if(!scenes[currentIdx]) return;
        if(synth.paused) { synth.resume(); return; }
        synth.cancel();
        const m = new SpeechSynthesisUtterance(cleanScript(scenes[currentIdx].narration));
        m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
        m.onstart = () => { document.getElementById('subtitleText').style.display = 'inline-block'; };
        m.onend = () => { if(currentIdx === scenes.length-1) document.getElementById('subtitleText').innerText = ""; };
        synth.speak(m);
    }
    
    function pauseSpeech() { synth.pause(); }
    
    async function playFullSequence() {
        for(let i=0; i < scenes.length; i++) {
            currentIdx = i; updatePlayer(); speakActive();
            await new Promise(r => { const check = setInterval(() => { if(!synth.speaking){ clearInterval(check); r(); } }, 500); });
        }
    }
</script>
</html>
