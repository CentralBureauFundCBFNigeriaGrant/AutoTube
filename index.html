<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube | Dual-Channel Studio v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #282828; border-radius: 12px; }
        .sidebar-item { border-radius: 8px; transition: 0.2s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 10px; font-size: 12px; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #272727; }
        .active-niche { background-color: #272727; border-left: 4px solid #f00; color: #f00; font-weight: bold; }
        
        .player-stage { width: 100%; aspect-ratio: 16/9; background: #050505; border-radius: 16px; overflow: hidden; border: 1px solid #333; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        
        .scene-nav-btn { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 15px; border-radius: 50%; color: white; transition: 0.3s; border: 1px solid #444; z-index: 10; }
        .scene-nav-btn:hover { background: #f00; border-color: #f00; }
        
        .key-input { background: #000; border: 1px solid #333; color: #666; font-size: 10px; padding: 6px; border-radius: 6px; width: 100%; outline: none; }
        .key-input:focus { border-color: #f00; color: #fff; }
        
        .control-btn { transition: 0.2s; border: 1px solid #333; font-weight: 900; text-transform: uppercase; font-size: 10px; border-radius: 10px; padding: 12px; }
        .status-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="p-3 md:p-6" onload="init()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="card p-4 flex items-center gap-3">
                <div class="w-10 h-7 yt-red rounded flex items-center justify-center">
                    <div class="w-0 h-0 border-t-[5px] border-t-transparent border-l-[8px] border-l-white border-b-[5px] border-b-transparent ml-1"></div>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">AutoTube</h1>
            </div>

            <div class="card p-5">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest text-center">Voice Lab</h2>
                <div class="bg-black p-3 rounded-lg border border-[#282828] mb-4">
                    <select id="voiceSelect" class="w-full bg-black text-[11px] text-red-500 border-none outline-none"></select>
                </div>
                <button onclick="testVoice()" class="w-full border border-[#333] py-2 rounded-xl text-[10px] font-bold hover:bg-[#272727]">TEST VOICE</button>
            </div>

            <div class="card p-5 border-t-2 border-red-600">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Master Keys</h2>
                <div class="space-y-3">
                    <input id="groqKeyIn" type="password" class="key-input" onchange="saveKeys()" placeholder="Groq Key">
                    <input id="pexelsKeyIn" type="password" class="key-input" onchange="saveKeys()" placeholder="Pexels Key">
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            
            <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-red-600">
                <div>
                    <h2 class="text-2xl font-black tracking-tight">CONTENT ENGINE</h2>
                    <p class="text-[10px] text-gray-500 uppercase">Focus: <span id="activeNText" class="text-red-600"></span></p>
                </div>
                <button onclick="genIdeas()" class="yt-red px-10 py-4 rounded-full font-black text-sm hover:scale-105 transition-all">GENERATE IDEAS</button>
            </div>

            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div id="studioRoom" class="hidden space-y-6">
                
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-[10px] font-black tracking-widest uppercase">Dual-Channel Studio</h2>
                        <div class="flex gap-2">
                            <button onclick="genFullProduction()" id="prodBtn" class="bg-red-600 px-6 py-2 rounded-lg text-[9px] font-black uppercase">Start Full Auto-Production</button>
                        </div>
                    </div>

                    <div class="player-stage group">
                        <div id="mainMediaBox" class="w-full h-full flex items-center justify-center text-gray-800 font-black text-xs uppercase bg-[#050505]">
                            Waiting for production command...
                        </div>
                        
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="prevScene()" class="scene-nav-btn">←</button>
                        </div>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="nextScene()" class="scene-nav-btn">→</button>
                        </div>
                        
                        <div class="absolute bottom-4 left-4 right-4 flex justify-between items-center pointer-events-none">
                            <span id="sceneIndicator" class="bg-black/80 px-4 py-1 rounded-full text-[9px] font-bold text-red-600 border border-white/10 pointer-events-auto">Scene 0 / 0</span>
                            <div id="autoStatus" class="status-tag bg-gray-800 text-gray-400">System Idle</div>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2 bg-black p-5 rounded-xl border border-[#282828]">
                            <p class="text-[9px] text-gray-500 font-bold mb-2 uppercase">Narration Output (Voice Only)</p>
                            <div id="currentSceneText" class="text-sm italic leading-relaxed text-white">---</div>
                            <div class="mt-4 pt-4 border-t border-white/5">
                                <p class="text-[8px] text-gray-600 font-bold uppercase">Video Prompt (Pexels Only)</p>
                                <div id="currentVisualPrompt" class="text-[10px] text-emerald-500 font-mono">---</div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-2">
                            <button onclick="playFullSequence()" id="playAllBtn" class="control-btn bg-white text-black">Play Sequence</button>
                            <div class="flex gap-2">
                                <button onclick="speakActive()" class="flex-1 control-btn text-white">Play</button>
                                <button onclick="pauseSpeech()" class="flex-1 control-btn text-white">Pause</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let niches = JSON.parse(localStorage.getItem('myNiches')) || ["Bible Stories", "Motivation"];
        let curN = niches[0];
        let scenes = []; 
        let currentIdx = 0;
        const synth = window.speechSynthesis;

        function init() {
            document.getElementById('groqKeyIn').value = localStorage.getItem('groq_key') || "";
            document.getElementById('pexelsKeyIn').value = localStorage.getItem('pexels_key') || "";
            renderN(); selN(curN); setTimeout(loadVoices, 500);
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groqKeyIn').value);
            localStorage.setItem('pexels_key', document.getElementById('pexelsKeyIn').value);
        }

        function loadVoices() {
            const select = document.getElementById('voiceSelect');
            const voices = synth.getVoices();
            select.innerHTML = voices
                .sort((a, b) => a.lang.localeCompare(b.lang))
                .map(v => `<option value="${v.name}">[${v.lang}] ${v.name}</option>`).join('');
        }

        // --- PRODUCTION ENGINE ---
        async function genFullProduction() {
            const btn = document.getElementById('prodBtn');
            const status = document.getElementById('autoStatus');
            btn.innerText = "WRITING SCRIPT...";
            status.innerText = "AI BRAINSTORMING";
            status.className = "status-tag bg-blue-900 text-blue-200 animate-pulse";

            const key = document.getElementById('groqKeyIn').value;
            
            try {
                // Requesting structured JSON for dual channels
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `Generate a 5-scene YouTube script for ${curN}. 
                        Return ONLY a valid JSON array. 
                        Each object must have 'v_prompt' (a high-detail 10-word description for a 4k video search) and 'narration' (clean spoken text). 
                        Example: [{"v_prompt": "Cinematic wide shot of Moses parting the red sea 4k", "narration": "And then, the waters divided."}]`}]
                    })
                });
                
                const d = await r.json();
                const content = d.choices[0].message.content;
                scenes = JSON.parse(content.match(/\[.*\]/s)[0]);
                
                currentIdx = 0;
                btn.innerText = "AUTO-GENERATING VISUALS...";
                status.innerText = "FILMING IN PROGRESS";
                status.className = "status-tag bg-emerald-900 text-emerald-200 animate-pulse";
                
                updatePlayer();
                
                // --- AUTOMATIC VISUAL GENERATION LOOP ---
                for(let i=0; i<scenes.length; i++) {
                    await genVisualForScene(i);
                }
                
                btn.innerText = "PRODUCTION COMPLETE";
                status.innerText = "READY TO PLAY";
                status.className = "status-tag bg-emerald-600 text-white";

            } catch(e) { 
                alert("Production Error: Please ensure you are using a clean niche and valid key.");
                btn.innerText = "RETRY PRODUCTION";
            }
        }

        async function genVisualForScene(idx) {
            const scene = scenes[idx];
            const pKey = document.getElementById('pexelsKeyIn').value;
            
            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(scene.v_prompt)}&per_page=1`, {
                    headers: { Authorization: pKey }
                });
                const data = await res.json();
                
                if (data.videos?.length > 0) {
                    scene.mType = 'video';
                    scene.mUrl = data.videos[0].video_files.find(f => f.width >= 1280)?.link || data.videos[0].video_files[0].link;
                } else { throw new Error(); }
            } catch (e) {
                scene.mType = 'image';
                scene.mUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent('8k cinematic photography ' + scene.v_prompt)}?width=1280&height=720&nologo=true`;
            }
            
            // Only update player live if we are currently looking at that scene
            if(currentIdx === idx) updatePlayer();
        }

        function updatePlayer() {
            if(!scenes[currentIdx]) return;
            const scene = scenes[currentIdx];
            const box = document.getElementById('mainMediaBox');
            
            document.getElementById('sceneIndicator').innerText = `Scene ${currentIdx + 1} / ${scenes.length}`;
            document.getElementById('currentSceneText').innerText = `"${scene.narration}"`;
            document.getElementById('currentVisualPrompt').innerText = scene.v_prompt.toUpperCase();

            box.innerHTML = '';
            if (!scene.mUrl) {
                box.innerHTML = `<div class="animate-pulse">GENERATING SCENE ${currentIdx+1}...</div>`;
            } else if (scene.mType === 'video') {
                box.innerHTML = `<video src="${scene.mUrl}" autoplay loop muted playsinline></video>`;
            } else {
                box.innerHTML = `<img src="${scene.mUrl}">`;
            }
        }

        // --- AUDIO CONTROLS ---
        function speakActive() {
            if(!scenes[currentIdx]) return;
            if(synth.paused) { synth.resume(); return; }
            synth.cancel();
            const m = new SpeechSynthesisUtterance(scenes[currentIdx].narration);
            m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            m.rate = 0.95;
            synth.speak(m);
        }

        function pauseSpeech() { if(synth.speaking) synth.pause(); }

        async function playFullSequence() {
            const btn = document.getElementById('playAllBtn');
            btn.innerText = "PLAYING...";
            for(let i=0; i < scenes.length; i++) {
                currentIdx = i;
                updatePlayer();
                speakActive();
                await new Promise(r => {
                    const check = setInterval(() => { if(!synth.speaking){ clearInterval(check); r(); } }, 500);
                });
            }
            btn.innerText = "PLAY SEQUENCE";
        }

        // --- UI NAVIGATION ---
        function nextScene() { if(currentIdx < scenes.length - 1) { currentIdx++; updatePlayer(); } }
        function prevScene() { if(currentIdx > 0) { currentIdx--; updatePlayer(); } }
        function selN(n) { curN = n; document.getElementById('activeNText').innerText = n.toUpperCase(); }
        function addN() { const v = document.getElementById('nIn').value; if(v){ niches.push(v); localStorage.setItem('myNiches', JSON.stringify(niches)); renderN(); document.getElementById('nIn').value=""; } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); localStorage.setItem('myNiches', JSON.stringify(niches)); renderN(); }
        function renderN() {
            document.getElementById('nicheList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}">
                    <span class="truncate">${n}</span>
                    <span onclick="delN(${i},event)" class="text-gray-600 hover:text-red-500">🗑️</span>
                </div>`).join('');
        }
        function testVoice() {
            const m = new SpeechSynthesisUtterance("AutoTube Dual-Channel Ready.");
            m.voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            synth.speak(m);
        }
        function openStudio() { document.getElementById('studioRoom').classList.remove('hidden'); window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
        
        async function genIdeas() {
            const g = document.getElementById('ideasGrid');
            const key = document.getElementById('groqKeyIn').value;
            g.innerHTML = "<div class='col-span-2 text-center py-10'><div class='animate-spin inline-block w-4 h-4 border-2 border-red-600 border-t-transparent rounded-full mb-2'></div></div>";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", 
                    headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{role: "user", content: `5 viral YouTube titles for ${curN}. JSON: ["T1", "T2"]`}]
                    })
                });
                const d = await r.json();
                const t = JSON.parse(d.choices[0].message.content.match(/\[.*\]/s)[0]);
                g.innerHTML = t.map(x => `
                    <div onclick="openStudio()" class="card p-6 hover:border-red-600 cursor-pointer border-l-4 border-transparent">
                        <h3 class="font-bold text-sm mb-2">${x}</h3>
                        <p class="text-[9px] text-red-600 font-black uppercase">Start Production</p>
                    </div>`).join('');
            } catch(e) { g.innerHTML = "<p class='col-span-2 text-center text-red-500 text-xs'>Check Keys.</p>"; }
        }
    </script>
</body>
</html>
