<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube AI - Gemini Brain Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full glass p-8 rounded-3xl shadow-2xl">
        <h1 class="text-4xl font-black mb-2 text-center gradient-text italic">AUTOTUBE AI</h1>
        <p class="text-slate-400 text-center mb-8">Powered by Gemini Pro 1.5</p>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Gemini API Key</label>
                <input id="apiKey" type="password" placeholder="Paste your key here..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Channel Niche</label>
                <input id="nicheInput" type="text" placeholder="e.g. AI News, Travel Vlogs, Horror Stories" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all">
            </div>

            <button onclick="askGemini()" id="genBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95">
                ASK GEMINI BRAIN
            </button>
        </div>

        <div id="resultArea" class="mt-8 hidden animate-fade-in">
            <div class="p-5 bg-slate-900/50 border border-blue-500/30 rounded-2xl">
                <h3 class="text-blue-400 font-bold text-sm mb-3 flex items-center">
                    <span class="mr-2">✨</span> AI GENERATED STRATEGY:
                </h3>
                <p id="ideaText" class="text-slate-200 leading-relaxed"></p>
            </div>
        </div>
        
        <p id="status" class="mt-4 text-center text-sm text-slate-500"></p>
    </div>

    <script>
        async function askGemini() {
            const key = document.getElementById('apiKey').value;
            const niche = document.getElementById('nicheInput').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            const ideaText = document.getElementById('ideaText');

            if (!key || !niche) {
                alert("Please provide both an API Key and a Niche!");
                return;
            }

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "THINKING...";
            status.innerText = "Connecting to Gemini API...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Give me a viral, high-CTR YouTube video idea, title, and a 2-sentence script hook for a faceless channel in the ${niche} niche.` }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // Display Result
                ideaText.innerText = aiResponse;
                resultArea.classList.remove('hidden');
                status.innerText = "Success!";
                
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                status.innerText = "Connection failed.";
            } finally {
                btn.disabled = false;
                btn.innerText = "ASK GEMINI BRAIN";
            }
        }
    </script>
</body>
</html>
