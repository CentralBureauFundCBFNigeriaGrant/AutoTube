<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube v1.9 | Clean Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .yt-red { background-color: #f00; }
        .card { background-color: #0f0f0f; border: 1px solid #272727; border-radius: 12px; padding: 16px; }
        .sidebar-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .sidebar-item:hover { background: #272727; }
        .active-niche { background: #272727; border-left: 3px solid #f00; color: #f00; font-weight: bold; }
        .timeline-card { min-width: 250px; background: #0f0f0f; border: 1px solid #272727; border-radius: 10px; padding: 12px; }
        .pulse { animation: p 1.5s infinite; }
        @keyframes p { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-5">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-6 h-5 yt-red rounded flex items-center justify-center text-[10px]">▶</div>
                <span class="font-black text-lg tracking-tighter">AutoTube</span>
            </div>

            <div class="card">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-3">Voice Lab</h3>
                <button id="recBtn" onclick="toggleMic()" class="w-full border border-[#333] py-2 rounded-lg text-[11px] font-bold hover:bg-[#1a1a1a]">RECORD DNA</button>
                <div id="vPlay" class="hidden mt-3 space-y-2">
                    <audio id="vAud" controls class="h-8 w-full"></audio>
                    <div class="flex gap-1">
                        <button onclick="vSave()" class="flex-1 bg-green-700 text-[10px] py-1 rounded">SAVE</button>
                        <button onclick="vDiscard()" class="flex-1 bg-zinc-800 text-[10px] py-1 rounded">TRASH</button>
                    </div>
                </div>
                <input id="vId" type="text" placeholder="ElevenLabs ID" class="w-full bg-black border border-[#333] rounded mt-3 p-2 text-[11px] text-red-500">
            </div>

            <div class="card">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-3">Niches</h3>
                <div id="nList" class="space-y-1"></div>
                <div class="flex gap-1 mt-3">
                    <input id="nIn" type="text" placeholder="New..." class="w-full bg-black border border-[#333] rounded p-1 text-xs">
                    <button onclick="addN()" class="bg-[#272727] px-2 rounded">+</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-4">
            <div class="card flex justify-between items-center">
                <div>
                    <h2 class="font-bold text-lg">Content Engine</h2>
                    <p class="text-[10px] text-gray-500">Niche: <span id="curN" class="text-red-600 font-bold uppercase"></span></p>
                </div>
                <button onclick="genIdeas()" class="yt-red px-6 py-2 rounded-full font-bold text-xs">GENERATE IDEAS</button>
            </div>

            <div id="iGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>

            <div id="prod" class="hidden card border-t-2 border-red-600">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold uppercase">Studio</h2>
                    <div class="flex gap-2">
                        <button onclick="genScr()" id="sBtn" class="bg-[#272727] px-3 py-1 rounded text-[10px] font-bold">1. SCRIPT</button>
                        <button onclick="syncV()" id="vBtn" class="yt-red px-3 py-1 rounded text-[10px] font-bold">2. SYNC VOICE</button>
                    </div>
                </div>
                <div id="tLine" class="flex overflow-x-auto gap-3 pb-3"></div>
                <div id="sOut" class="text-[11px] text-gray-400 font-mono bg-black p-3 rounded border border-[#272727] h-24 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const G_KEY = "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"; 
        const E_KEY = "sk_e8fab383f77e7b76a0e0c4b5ad882e2000881811be4c5f22"; 

        let niches = JSON.parse(localStorage.getItem('nch')) || ["AI News"];
        let curN = niches[0];
        let scenes = [];
        let recorder;
        let chunks = [];

        function init() { renderN(); selN(curN); }

        // --- MIC ---
        async function toggleMic() {
            const btn = document.getElementById('recBtn');
            if (!recorder || recorder.state === "inactive") {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(s);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const b = new Blob(chunks, { type: 'audio/mpeg' });
                    document.getElementById('vAud').src = URL.createObjectURL(b);
                    document.getElementById('vPlay').classList.remove('hidden');
                };
                recorder.start();
                btn.innerText = "RECORDING..."; btn.classList.add('pulse', 'text-red-600');
            } else {
                recorder.stop();
                btn.innerText = "RECORD DNA"; btn.classList.remove('pulse', 'text-red-600');
            }
        }
        function vSave() { alert("Saved!"); document.getElementById('vPlay').classList.add('hidden'); }
        function vDiscard() { document.getElementById('vPlay').classList.add('hidden'); }

        // --- NICHES ---
        function addN() { const v = document.getElementById('nIn').value; if(v){ niches.push(v); saveN(); renderN(); } }
        function delN(i, e) { e.stopPropagation(); niches.splice(i, 1); saveN(); renderN(); }
        function saveN() { localStorage.setItem('nch', JSON.stringify(niches)); }
        function renderN() {
            document.getElementById('nList').innerHTML = niches.map((n, i) => `
                <div onclick="selN('${n}')" class="sidebar-item ${n===curN?'active-niche':''}">
                    <span>${n}</span><span onclick="delN(${i},event)">🗑️</span>
                </div>`).join('');
        }
        function selN(n) { curN = n; document.getElementById('curN').innerText = n; renderN(); }

        // --- ENGINE ---
        async function genIdeas() {
            const g = document.getElementById('iGrid'); g.innerHTML = "<p class='p-5 text-gray-600'>Thinking...</p>";
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${G_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.1-8b-instant", messages: [{role: "user", content: `5 short titles for ${curN}. JSON: ["T1","T2"]`}]})
            });
            const d = await r.json();
            const t = JSON.parse(d.choices[0].message.content);
            g.innerHTML = t.map(x => `<div onclick="goStudio('${x}')" class="card hover:border-red-600 cursor-pointer"><h4 class="text-sm font-bold">${x}</h4><p class="text-[9px] text-red-600 mt-2">PRODUCE →</p></div>`).join('');
        }

        function goStudio(t) { document.getElementById('prod').classList.remove('hidden'); window.scrollTo(0,document.body.scrollHeight); }

        async function genScr() {
            document.getElementById('sBtn').innerText = "...";
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${G_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.1-8b-instant", messages: [{role: "user", content: `4 scenes for ${curN}. Format: [S1] text [S2] text [S3] text [S4] text.`}]})
            });
            const d = await r.json();
            const s = d.choices[0].message.content;
            document.getElementById('sOut').innerText = s;
            scenes = s.split(/\[S\d\]/i).filter(x => x.trim().length > 5);
            document.getElementById('tLine').innerHTML = scenes.map((x, i) => `
                <div class="timeline-card">
                    <p class="text-[9px] text-gray-500 mb-1 uppercase font-bold">Scene ${i+1}</p>
                    <p class="text-[11px] h-12 overflow-hidden italic text-gray-300">"${x.trim()}"</p>
                    <div id="v-${i}" class="mt-2 text-[9px] text-gray-600">Awaiting voice...</div>
                </div>`).join('');
            document.getElementById('sBtn').innerText = "SCRIPT";
        }

        async function syncV() {
            const vid = document.getElementById('vId').value || "pNInz6obpgnuMsc3W95Q";
            document.getElementById('vBtn').innerText = "SYNCING...";
            for(let i=0; i<scenes.length; i++) {
                const s = document.getElementById(`v-${i}`);
                s.innerHTML = "<span class='text-red-600 animate-pulse'>GENERATING...</span>";
                const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
                    method: "POST", headers: {"xi-api-key": E_KEY, "Content-Type": "application/json"},
                    body: JSON.stringify({text: scenes[i].trim(), model_id: "eleven_monolingual_v1"})
                });
                const blob = await r.blob();
                if(blob.size < 100) { s.innerHTML = "Error (Empty)"; } 
                else { s.innerHTML = `<audio controls class="h-6 w-full"><source src="${URL.createObjectURL(blob)}"></audio>`; }
            }
            document.getElementById('vBtn').innerText = "SYNC VOICE";
        }

        init();
    </script>
</body>
</html>
