<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTube AI | Llama Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-4xl font-extrabold mb-2 text-center gradient-text">AutoTube AI</h1>
        <p class="text-slate-400 text-center mb-8">Powered by Llama 3 & Groq</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Topic or Niche</label>
                <input id="nicheInput" type="text" placeholder="e.g. Scary Space Anomalies" 
                    class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button id="generateBtn" onclick="generateTitle()" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95">
                GENERATE IDEAS (AI)
            </button>
        </div>

        <div id="resultArea" class="mt-8 hidden animate-fade-in">
            <div class="p-5 bg-slate-900/50 border border-indigo-500/30 rounded-2xl">
                <h3 class="text-indigo-400 font-bold text-sm mb-3 flex items-center">
                    <span class="mr-2">🚀</span> VIRAL STRATEGY:
                </h3>
                <p id="ideaText" class="text-slate-200 leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
        
        <p id="status" class="mt-4 text-center text-sm text-slate-500"></p>
    </div>

    <script>
        async function generateTitle() {
            const nicheInput = document.getElementById('nicheInput');
            const ideaText = document.getElementById('ideaText');
            const resultArea = document.getElementById('resultArea');
            const status = document.getElementById('status');
            const btn = document.getElementById('generateBtn');

            const promptValue = nicheInput.value.trim();

            if (!promptValue) {
                alert("Please enter a topic first!");
                return;
            }

            status.innerText = "Consulting Llama 3...";
            btn.disabled = true;
            btn.innerText = "THINKING...";
            resultArea.classList.add('hidden');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        // PASTE YOUR KEY INSIDE THE QUOTES BELOW
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            {
                                role: "user",
                                content: `Give me 3 viral YouTube video titles and a 1-sentence hook for: ${promptValue}`
                            }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResult = data.choices[0].message.content;
                
                ideaText.innerText = aiResult;
                resultArea.classList.remove('hidden');
                status.innerText = "Success!";

            } catch (error) {
                console.error("Error:", error);
                status.innerText = "Connection failed.";
                alert("Groq Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "GENERATE IDEAS (AI)";
            }
        }
    </script>
</body>
</html>

    </script>
</body>
</html>
