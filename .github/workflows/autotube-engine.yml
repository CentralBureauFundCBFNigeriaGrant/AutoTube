name: Marvel Stand-Alone Soldier
on:
  push:
    paths:
      - 'mission.txt'

jobs:
  heavy-lifting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Content with Ollama
        uses: ai-action/ollama-action@v2
        with:
          model: llama3.2
          prompt: "Write a 30s YouTube Short script about ${{ github.event.head_commit.message }}"

      - name: Marvel Video Render
        run: |
          pip install moviepy gTTS google-api-python-client google-auth-oauthlib
          # The Python script here will generate the MP4 and then call the Upload function
          python marvel_engine.py

      - name: AutoTube Post
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python upload_to_yt.py
