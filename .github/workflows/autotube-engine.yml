name: AutoTube Engine

on:
  push:
    paths:
      - 'mission.txt'
  workflow_dispatch:

jobs:
  heavy-lifting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq requests
          sudo apt-get install jq -y

      - name: Run Marvel Engine (Llama 3)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marvel_engine.py

      - name: Verify Script Generation
        run: |
          if [ -f "generated_script.md" ]; then
            echo "Success: generated_script.md exists."
            cat generated_script.md
          else
            echo "Error: generated_script.md was not created!"
            exit 1
          fi

      - name: Trigger Creatomate Render
        env:
          CREATOMATE_API_KEY: ${{ secrets.CREATOMATE_API_KEY }}
        run: |
          # 1. Read the script and safely escape it for JSON using jq
          SCRIPT_JSON_SAFE=$(jq -Rs . < generated_script.md)

          # 2. Build the full JSON payload
          JSON_PAYLOAD=$(jq -n \
            --arg template_id "bc796d8a-e720-41fb-89f8-284d1a49a844" \
            --arg content "$SCRIPT_JSON_SAFE" \
            '{
              template_id: $template_id,
              modifications: {
                "Text-1": ($content | fromjson)
              }
            }')

          # 3. Send to Creatomate
          curl --request POST \
            --url https://api.creatomate.com/v1/renders \
            --header "Authorization: Bearer $CREATOMATE_API_KEY" \
            --header "Content-Type: application/json" \
            --data "$JSON_PAYLOAD"
          
          echo "Render successfully sent to Creatomate!"
          
