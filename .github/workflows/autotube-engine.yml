name: AutoTube Engine

on:
  push:
    paths:
      - 'mission.txt'
  workflow_dispatch:

jobs:
  heavy-lifting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq

      - name: Run Marvel Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marvel_engine.py
        
