name: AutoTube Engine

on:
  push:
    paths:
      - 'mission.txt'
  workflow_dispatch:

jobs:
  heavy-lifting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq requests

      - name: Run Marvel Engine (Llama 3)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marvel_engine.py

      - name: Trigger Creatomate Render
        env:
          CREATOMATE_API_KEY: ${{ secrets.CREATOMATE_API_KEY }}
        run: |
          # This reads the script generated by the Python engine
          SCRIPT_CONTENT=$(cat generated_script.md)
          
          # This sends the data to Creatomate using your Template ID
          curl --request POST \
            --url https://api.creatomate.com/v1/renders \
            --header "Authorization: Bearer $CREATOMATE_API_KEY" \
            --header "Content-Type: application/json" \
            --data "{
              \"template_id\": \"bc796d8a-e720-41fb-89f8-284d1a49a844\",
              \"modifications\": {
                \"Text-1\": \"$SCRIPT_CONTENT\"
              }
            }"
          
          echo "Render triggered successfully!"
          
